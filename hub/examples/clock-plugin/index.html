<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Clock plugin</title>
  <style>
    body { margin: 0; height: 100vh; display: grid; place-items: center;
           font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee; }
    #t { font-size: 3rem; font-variant-numeric: tabular-nums; }
    small { color: #888; }
  </style>
</head>
<body>
  <div style="text-align:center">
    <div id="t">--:--:--</div>
    <small>example.clock — a workspacer plugin (webview pane)</small>
  </div>
  <script>
    const t = document.getElementById('t');
    setInterval(() => { t.textContent = new Date().toLocaleTimeString(); }, 250);
  </script>
</body>
</html>
