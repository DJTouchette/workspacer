<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rivet</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 8px 12px; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 10px;
  }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; }
  #status { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #21262d; }
  #status.up { background: #1a4d2e; color: #7ee2a8; }
  #status.down { background: #5c1a1a; color: #f0a0a0; }
  .toolbar { padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 1px solid #21262d; }
  button {
    font: inherit; cursor: pointer; background: #21262d; color: #c9d1d9;
    border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px;
  }
  button:hover { background: #30363d; }
  .argrow { padding: 8px 12px; display: flex; gap: 6px; border-bottom: 1px solid #21262d; }
  .argrow input { flex: 1; font: inherit; background: #010409; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 4px 8px; }
  pre {
    flex: 1; margin: 0; padding: 12px; overflow: auto; white-space: pre-wrap; word-break: break-word;
    background: #010409;
  }
  .err { color: #f0a0a0; }
  .muted { color: #6e7681; }
</style>
</head>
<body>
  <header>
    <h1>⛏ Rivet</h1>
    <span id="status">checking…</span>
    <span id="project" class="muted"></span>
  </header>
  <div class="toolbar" id="toolbar"></div>
  <div class="argrow">
    <input id="args" placeholder='extra args, space-separated — e.g. "--limit 20" or a file path' />
  </div>
  <pre id="out"><span class="muted">Pick a tool above. Output streams here.</span></pre>

<script>
const TOOLS = [
  "recon.overview", "recon.hotspots", "recon.search", "recon.symbols",
  "recon.related", "recon.tests", "recon.changes", "recon.context", "recon.grep",
  "witness.select", "witness.staged",
  "schema.overview", "schema.tables", "schema.describe",
];

const out = document.getElementById("out");
const argsInput = document.getElementById("args");

function setStatus() {
  fetch("/health").then(r => r.json()).then(h => {
    const s = document.getElementById("status");
    s.textContent = h.rivetReady ? "rivet up" : "rivet down";
    s.className = h.rivetReady ? "up" : "down";
    document.getElementById("project").textContent = h.projectDir || "";
  }).catch(() => {
    const s = document.getElementById("status");
    s.textContent = "bridge unreachable"; s.className = "down";
  });
}

function run(method) {
  const args = argsInput.value.trim() ? argsInput.value.trim().split(/\s+/) : [];
  out.textContent = "running " + method + (args.length ? " " + args.join(" ") : "") + " …";
  fetch("/api/call", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ method, args }),
  }).then(r => r.json()).then(res => {
    if (res.error) { out.innerHTML = '<span class="err">' + esc(res.error) + '</span>'; return; }
    const body = res.output != null ? res.output : JSON.stringify(res, null, 2);
    out.textContent = body || "(empty)";
    if (res.isError) out.classList.add("err"); else out.classList.remove("err");
  }).catch(e => { out.innerHTML = '<span class="err">' + esc(String(e)) + '</span>'; });
}

function esc(s) { return s.replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

const tb = document.getElementById("toolbar");
TOOLS.forEach(t => {
  const b = document.createElement("button");
  b.textContent = t;
  b.onclick = () => run(t);
  tb.appendChild(b);
});

setStatus();
setInterval(setStatus, 5000);
</script>
</body>
</html>
