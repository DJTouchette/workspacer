<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d11" />
<meta name="format-detection" content="telephone=no" />
<title>Workspacer Mobile</title>
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Workspacer" />
<style>
  /* Premium dark skin — "mission control on your phone". Deep neutral surfaces,
     one restrained blue accent; amber is reserved for needs-you heat, green for
     working. Self-contained: system font stack, no bundler, no external assets.
     Every session is driven through its snapshot (conversation + pending state)
     over the hub bus, so this works identically for stream-mode and PTY agents
     with no terminal. */
  :root {
    --bg:#0b0d11; --raised:#13161c; --surface:#161a21; --elevated:#1b2029;
    --input:#0d0f14; --hover:#1d222b; --selected:#232a37;
    --line:#272d38; --line-subtle:#1f242e; --line-input:#303747;
    --text:#eceef4; --text2:#c7cdd9; --muted:#98a0b1; --faint:#7a8296; --disabled:#525a6b;
    --accent:#5b8bef; --accent-text:#8fb1f7; --accent-bg:rgba(91,139,239,0.13);
    --accent-glow:rgba(91,139,239,0.15);
    --success:#3fd68f; --success-text:#6fe3ae; --success-bg:rgba(63,214,143,0.10);
    --error:#f2726d; --error-bg:rgba(242,114,109,0.10);
    --warning:#f2b23e; --warning-text:#f7c465; --warning-bg:rgba(242,178,62,0.10);
    --user-bubble:rgba(91,139,239,0.12); --user-border:rgba(91,139,239,0.26);
    --radius:16px; --radius-sm:12px;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
    --mono:ui-monospace,"SF Mono","JetBrainsMono Nerd Font Mono",Menlo,Consolas,monospace;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font:16px/1.5 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    overscroll-behavior-y:none;
    -webkit-font-smoothing:antialiased;
  }
  button { font-family:inherit; cursor:pointer; }
  #app { display:flex; flex-direction:column; height:calc(100dvh - var(--kb,0px)); }

  /* Header */
  header {
    flex:0 0 auto; display:flex; align-items:center; gap:10px;
    padding:calc(12px + var(--safe-t)) 16px 12px; background:var(--raised);
    border-bottom:1px solid var(--line-subtle); position:sticky; top:0; z-index:5;
  }
  header .back {
    border:1px solid var(--line-subtle); background:var(--elevated); color:var(--text);
    width:40px; height:40px; border-radius:12px; font-size:24px; line-height:1; padding:0 0 2px;
    display:none; align-items:center; justify-content:center; flex:0 0 auto;
    transition:background .15s var(--ease);
  }
  header .back:active { background:var(--hover); }
  header.has-back .back { display:inline-flex; }
  header .titles { flex:1; min-width:0; }
  header h1 { font-size:19px; margin:0; font-weight:700; letter-spacing:-0.02em;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  header .sub { font-size:12.5px; color:var(--muted); font-weight:400; margin-top:2px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  header .sub .chip { font-size:11px; padding:2px 8px; }
  .dot { display:inline-flex; align-items:center; gap:6px; height:28px; padding:0 10px;
    border-radius:999px; background:var(--elevated); border:1px solid var(--line-subtle);
    font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    color:var(--faint); flex:0 0 auto; transition:color .2s var(--ease); }
  .dot::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--error);
    box-shadow:0 0 8px rgba(242,114,109,0.55); transition:background .2s var(--ease), box-shadow .2s var(--ease); }
  .dot::after { content:'Off'; }
  .dot.on { color:var(--muted); }
  .dot.on::before { background:var(--success); box-shadow:0 0 8px rgba(63,214,143,0.55); }
  .dot.on::after { content:'Live'; }
  header .bell { border:1px solid var(--line-subtle); background:var(--elevated); color:var(--muted);
    width:40px; height:40px; border-radius:12px; font-size:16px; line-height:1; display:inline-flex;
    align-items:center; justify-content:center; flex:0 0 auto; filter:grayscale(1) opacity(0.65);
    transition:filter .2s var(--ease), color .2s var(--ease); }
  header .bell.on { color:var(--accent-text); filter:none; }

  /* Scroll area (list views) */
  main { flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:16px 14px calc(24px + var(--safe-b)); position:relative; }

  /* Cards */
  .card {
    background:linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0) 48%), var(--raised);
    border:1px solid var(--line-subtle); border-radius:var(--radius);
    padding:16px; margin-bottom:12px; position:relative; overflow:hidden;
    transition:transform .15s var(--ease), border-color .18s var(--ease),
      box-shadow .18s var(--ease), opacity .18s var(--ease), background-color .15s var(--ease);
  }
  .card.tap:active { transform:scale(0.985); background-color:var(--hover); }
  .card.blocked {
    border-color:rgba(242,178,62,0.45);
    box-shadow:0 0 0 1px rgba(242,178,62,0.15), 0 8px 28px -10px rgba(242,178,62,0.30);
    background:linear-gradient(180deg, rgba(242,178,62,0.06), rgba(242,178,62,0) 60%), var(--raised);
  }
  .card.blocked::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--warning);
  }
  .card.working::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--success);
    animation:breathe 2.6s var(--ease) infinite;
  }
  .card.stopped { opacity:.55; }
  @keyframes breathe { 0%,100%{opacity:.2} 50%{opacity:.75} }
  .row { display:flex; align-items:center; gap:12px; }
  .grow { flex:1; min-width:0; }
  .name { font-weight:650; font-size:16px; letter-spacing:-0.01em;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .path { font-family:var(--mono); font-size:11.5px; color:var(--faint); margin-top:6px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .meta { color:var(--muted); font-size:12.5px; margin-top:10px; display:flex; gap:6px 10px;
    flex-wrap:wrap; align-items:center; }
  .meta .mono { font-family:var(--mono); font-size:11.5px; }

  /* State chip — pill + status dot, color-coded per state */
  .chip { font-size:12px; font-weight:650; padding:4px 10px; border-radius:999px; flex:0 0 auto;
    display:inline-flex; align-items:center; gap:6px; border:1px solid transparent;
    letter-spacing:.01em; white-space:nowrap;
    transition:color .18s var(--ease), background .18s var(--ease), border-color .18s var(--ease); }
  .chip .cdot { width:6px; height:6px; border-radius:50%; background:currentColor; flex:0 0 auto; }
  .chip.approval { color:var(--warning-text); background:var(--warning-bg); border-color:rgba(242,178,62,0.30); }
  .chip.question { color:var(--accent-text); background:var(--accent-bg); border-color:rgba(91,139,239,0.30); }
  .chip.work { color:var(--success-text); background:var(--success-bg); border-color:rgba(63,214,143,0.25); }
  .chip.work .cdot { animation:pulse 1.3s var(--ease) infinite; }
  .chip.idle { color:var(--muted); background:rgba(255,255,255,0.03); border-color:var(--line-subtle); }
  .chip.stop { color:var(--faint); background:transparent; border-color:var(--line-subtle); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  .tag { font-size:10px; font-weight:650; color:var(--faint); background:var(--elevated);
    border:1px solid var(--line-subtle); padding:2px 7px; border-radius:6px;
    letter-spacing:.05em; text-transform:uppercase; }

  /* Decision block (approvals / questions) */
  .decision { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm);
    padding:14px; margin-top:12px; }
  .decision[data-kind="approval"] { border-color:rgba(242,178,62,0.28); }
  .decision .q { font-weight:650; font-size:15px; margin-bottom:2px; line-height:1.45; }
  .decision .tool { font-family:var(--mono); font-size:13.5px; color:var(--warning-text); }
  .decision .inp { font-family:var(--mono); font-size:12px; color:var(--muted); margin-top:10px;
    white-space:pre-wrap; word-break:break-word; max-height:132px; overflow:auto;
    background:var(--input); border:1px solid var(--line-subtle); border-radius:10px; padding:10px 12px; }
  .btns { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
  .btn { flex:1 1 auto; min-width:84px; min-height:48px; border:1px solid var(--line-input);
    background:var(--elevated); color:var(--text); font-size:15px; font-weight:650;
    padding:12px 14px; border-radius:12px;
    transition:transform .15s var(--ease), background .15s var(--ease), border-color .15s var(--ease); }
  .btn:active { transform:scale(0.97); background:var(--hover); }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff;
    box-shadow:0 2px 14px rgba(91,139,239,0.30); }
  .btn.danger { color:var(--error); border-color:rgba(242,114,109,0.35); }
  .btn.good { color:var(--success-text); border-color:rgba(63,214,143,0.35); background:var(--success-bg); }
  .btn.open { flex:0 0 auto; min-width:0; min-height:40px; padding:9px 16px;
    font-size:13.5px; border-radius:10px; }
  .qgroup { margin-top:16px; }
  .qgroup:first-child { margin-top:0; }
  .qgroup .q { margin-bottom:10px; line-height:1.45; }

  /* Question options — number badge + label + description */
  .qopt { display:flex; align-items:flex-start; gap:12px; width:100%; text-align:left; margin-top:8px;
    min-height:52px; border:1px solid var(--line-input); background:rgba(255,255,255,0.02);
    color:var(--text); border-radius:var(--radius-sm); padding:13px 14px; font-family:inherit;
    transition:background .15s var(--ease), border-color .15s var(--ease); }
  .qopt:active { background:var(--hover); }
  .qopt.picked { border-color:var(--accent); background:var(--accent-bg); }
  .qnum { flex:0 0 auto; width:24px; height:24px; border-radius:8px; display:flex; align-items:center;
    justify-content:center; font-size:12px; font-weight:700; border:1px solid var(--line-input);
    color:var(--muted); transition:background .15s var(--ease), color .15s var(--ease), border-color .15s var(--ease); }
  .qopt.picked .qnum { background:var(--accent); border-color:var(--accent); color:#fff; }
  .qtext { flex:1; min-width:0; }
  .qlabel { display:block; font-weight:600; font-size:15px; color:var(--text); line-height:1.4; }
  .qdesc { display:block; font-size:13px; color:var(--muted); margin-top:3px; line-height:1.5; }
  .qdecline { margin-top:14px; padding-top:12px; border-top:1px solid var(--line-subtle);
    display:flex; justify-content:flex-end; }
  .qdecline button { background:transparent; border:1px solid var(--line-input); color:var(--muted);
    font-size:13px; font-weight:600; min-height:40px; padding:9px 16px; border-radius:10px;
    font-family:inherit; transition:color .15s var(--ease), border-color .15s var(--ease), background .15s var(--ease); }
  .qdecline button:active { color:var(--error); border-color:rgba(242,114,109,0.5);
    background:var(--error-bg); }

  /* Persistent "you answered / declined" card in the transcript */
  .aqcard { margin:6px 0 14px; border:1px solid var(--line-subtle); border-left:2px solid var(--accent);
    background:rgba(255,255,255,0.02); border-radius:var(--radius-sm); padding:11px 14px; }
  .aqcard.declined { border-left-color:var(--error); }
  .aqhead { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    color:var(--accent-text); margin-bottom:8px; display:flex; align-items:center; gap:5px; }
  .aqcard.declined .aqhead { color:var(--error); }
  .aqrow { margin-bottom:9px; }
  .aqrow:last-child { margin-bottom:0; }
  .aqq { font-size:13.5px; color:var(--muted); line-height:1.45; margin-bottom:2px; }
  .aqa { font-size:14px; color:var(--text); font-weight:600; line-height:1.45; }
  .aqbody { font-size:13.5px; color:var(--muted); line-height:1.5; }

  /* Chat view */
  #chat { flex:1 1 auto; display:none; flex-direction:column; min-height:0; }
  #chat.show { display:flex; }
  #transcript { flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:16px 14px 10px; }
  .turn { margin-bottom:12px; display:flex; }
  .turn.user { justify-content:flex-end; }
  .bubble { max-width:88%; padding:11px 14px; border-radius:18px; font-size:15.5px; line-height:1.5;
    white-space:pre-wrap; word-break:break-word; }
  .turn.user .bubble { background:var(--user-bubble); border:1px solid var(--user-border);
    border-bottom-right-radius:6px; }
  .turn.assistant .bubble { background:var(--raised); border:1px solid var(--line-subtle);
    border-bottom-left-radius:6px; }
  .bubble pre { background:var(--input); border:1px solid var(--line-subtle); border-radius:10px;
    padding:10px 12px; overflow:auto; font-family:var(--mono); font-size:12.5px; margin:8px 0; }
  .bubble code { font-family:var(--mono); font-size:13px; background:rgba(255,255,255,0.06);
    padding:1px 5px; border-radius:5px; color:#b6cdf9; }
  .bubble pre code { background:none; padding:0; border-radius:0; color:inherit; }

  /* Markdown blocks (assistant bubbles). User bubbles stay plain pre-wrap. */
  .bubble.md { white-space:normal; }
  .bubble.md > :first-child { margin-top:0; }
  .bubble.md > :last-child { margin-bottom:0; }
  .md-p { margin:8px 0; }
  .md-h { margin:14px 0 6px; font-weight:700; line-height:1.3; letter-spacing:-0.01em; }
  h1.md-h { font-size:1.16em; } h2.md-h { font-size:1.08em; }
  h3.md-h { font-size:1em; } h4.md-h { font-size:0.92em; }
  h1.md-h, h2.md-h { border-bottom:1px solid var(--line-subtle); padding-bottom:4px; }
  .md-list { margin:8px 0; padding-left:22px; }
  .md-list li { margin:3px 0; }
  .md-q { margin:8px 0; padding:3px 0 3px 12px; border-left:3px solid var(--line);
    color:var(--text2); font-style:italic; }
  .md-hr { border:none; border-top:1px solid var(--line); margin:14px 0; }
  .bubble.md a { color:var(--accent-text); text-decoration:underline; }
  .bubble.md strong { color:#fff; font-weight:650; }
  .bubble.md em { color:var(--text); }

  /* "Responding" indicator — the desktop BrandSpinner: {␣} with a sliding bar. */
  .thinking { display:flex; align-items:center; padding:2px 2px 6px; }
  .brand { display:inline-flex; align-items:center; font-family:var(--mono); font-weight:700;
    font-size:15px; color:var(--accent-text); }
  .brand .track { position:relative; display:inline-block; width:13px; height:11px; margin:0 2px; }
  .brand .bar { position:absolute; top:1px; left:0; width:3px; height:9px; border-radius:1px;
    background:currentColor; animation:brandSlide .8s ease-in-out infinite alternate; }
  @keyframes brandSlide { from{transform:translateX(0)} to{transform:translateX(10px)} }
  .toolchip { display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12.5px;
    color:var(--text2); background:var(--elevated); border:1px solid var(--line-subtle);
    border-radius:10px; padding:8px 11px; margin:8px 0 2px; }
  .toolchip .tn { color:var(--accent-text); font-weight:600; flex:0 0 auto; }
  .toolchip .ti { color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .toolchip .sd { width:7px; height:7px; border-radius:50%; flex:0 0 auto; margin-left:auto; }
  .sd.running { background:var(--accent-text); animation:pulse 1.1s ease-in-out infinite; }
  .sd.complete { background:var(--success); }
  .sd.failed { background:var(--error); }

  /* Pinned decision above composer in chat */
  #chatDecision { flex:0 0 auto; padding:0 14px; }
  #chatDecision:empty { display:none; }
  #chatDecision .decision { margin:0 0 10px; box-shadow:0 -8px 28px -14px rgba(0,0,0,0.6); }

  /* Composer */
  #composer { flex:0 0 auto; display:flex; gap:10px; align-items:flex-end;
    padding:10px 14px calc(12px + var(--safe-b)); background:var(--raised);
    border-top:1px solid var(--line-subtle); }
  #composer textarea { flex:1; resize:none; border:1px solid var(--line-input); background:var(--input);
    color:var(--text); border-radius:14px; padding:12px 14px; font-size:16px; font-family:inherit;
    min-height:46px; max-height:120px; line-height:1.4;
    transition:border-color .18s var(--ease), box-shadow .18s var(--ease); }
  #composer textarea::placeholder { color:var(--faint); }
  #composer textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg); }
  #send { flex:0 0 auto; width:46px; height:46px; border-radius:14px; border:none; background:var(--accent);
    color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 12px rgba(91,139,239,0.35);
    transition:transform .15s var(--ease), opacity .18s var(--ease); }
  #send:active { transform:scale(0.94); }
  #send:disabled { opacity:.45; box-shadow:none; }

  /* Spawn form */
  .form { max-width:560px; margin:0 auto; position:relative; z-index:1; }
  .field { margin-bottom:20px; }
  .label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
    color:var(--faint); margin-bottom:8px; }
  .form input[type=text] { width:100%; border:1px solid var(--line-input); background:var(--input);
    color:var(--text); border-radius:12px; padding:13px 14px; font-size:16px; font-family:var(--mono);
    transition:border-color .18s var(--ease), box-shadow .18s var(--ease); }
  .form input::placeholder { color:var(--disabled); }
  .form input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg); }
  .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .chipbtn { border:1px solid var(--line-input); background:var(--elevated); color:var(--text2);
    font-size:13px; font-family:var(--mono); min-height:36px; padding:7px 12px; border-radius:10px;
    transition:background .15s var(--ease), border-color .15s var(--ease); }
  .chipbtn:active { background:var(--hover); border-color:var(--accent); }
  .seg { display:flex; gap:8px; flex-wrap:wrap; }
  .seg button { flex:1 1 auto; min-width:80px; min-height:46px; border:1px solid var(--line-input);
    background:var(--elevated); color:var(--text2); font-size:14px; font-weight:600; padding:11px;
    border-radius:12px; transition:background .18s var(--ease), border-color .18s var(--ease), color .18s var(--ease); }
  .seg button.on { border-color:var(--accent); background:var(--accent-bg); color:var(--accent-text); }
  .note { font-size:13px; color:var(--muted); margin-top:12px; display:flex; align-items:center; gap:7px; }
  .spawnBtn { width:100%; min-height:52px; border:none; background:var(--accent); color:#fff;
    font-size:16px; font-weight:650; padding:14px; border-radius:14px; margin-top:6px;
    box-shadow:0 2px 16px rgba(91,139,239,0.30);
    transition:transform .15s var(--ease), opacity .18s var(--ease); }
  .spawnBtn:active { transform:scale(0.98); }
  .spawnBtn:disabled { opacity:.55; box-shadow:none; }

  /* Empty / gate states */
  .empty { text-align:center; color:var(--muted); padding:76px 24px; position:relative; z-index:1; }
  .empty .ic { width:64px; height:64px; margin:0 auto; display:flex; align-items:center;
    justify-content:center; font-size:26px; color:var(--faint); background:var(--elevated);
    border:1px solid var(--line-subtle); border-radius:20px; }
  .empty .big { font-size:17px; font-weight:650; color:var(--text2); margin-top:18px; letter-spacing:-0.01em; }
  .empty .small { font-size:14px; color:var(--faint); margin-top:8px; line-height:1.55;
    max-width:280px; margin-left:auto; margin-right:auto; }
  .glow { position:absolute; top:-12%; left:50%; transform:translateX(-50%); width:520px; height:520px;
    border-radius:50%; pointer-events:none; z-index:0;
    background:radial-gradient(circle, var(--accent-glow) 0%, transparent 62%); }
  .gate { max-width:400px; margin:44px auto 0; padding:28px 22px; text-align:center; position:relative;
    z-index:1; background:var(--raised); border:1px solid var(--line-subtle); border-radius:20px; }
  .gate h2 { font-size:22px; margin:0 0 8px; letter-spacing:-0.02em; }
  .gate p { color:var(--muted); font-size:14.5px; margin:0 0 20px; line-height:1.5; }
  .gate input { width:100%; border:1px solid var(--line-input); background:var(--input); color:var(--text);
    border-radius:12px; padding:14px; font-size:16px; margin-bottom:12px; font-family:var(--mono);
    transition:border-color .18s var(--ease), box-shadow .18s var(--ease); }
  .gate input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-bg); }
  .gate button { width:100%; min-height:50px; border:none; background:var(--accent); color:#fff;
    font-size:16px; font-weight:650; padding:13px; border-radius:13px;
    box-shadow:0 2px 14px rgba(91,139,239,0.30); }

  /* Bottom nav */
  nav { flex:0 0 auto; display:flex; gap:4px; background:var(--raised);
    border-top:1px solid var(--line-subtle); padding:6px 10px calc(6px + var(--safe-b)); }
  nav button { flex:1; position:relative; border:none; background:none; color:var(--faint);
    font-size:11.5px; font-weight:650; padding:8px 0 9px; display:flex; flex-direction:column;
    align-items:center; gap:4px; border-radius:12px; letter-spacing:.01em;
    transition:color .18s var(--ease), background .18s var(--ease); }
  nav button .ni { font-size:20px; line-height:1; }
  nav button.active { color:var(--accent-text); background:var(--accent-bg); }
  nav .pill { position:absolute; top:4px; left:50%; margin-left:8px; min-width:18px; height:18px;
    padding:0 5px; border-radius:9px; background:var(--warning); color:#221503; font-size:11px;
    font-weight:800; display:none; align-items:center; justify-content:center;
    box-shadow:0 0 10px rgba(242,178,62,0.45); }
  nav .pill.show { display:inline-flex; }

  /* Toast */
  .toast { position:fixed; left:50%; bottom:calc(84px + var(--safe-b)); transform:translateX(-50%) translateY(10px);
    background:var(--elevated); border:1px solid var(--line); color:var(--text); font-size:13.5px;
    font-weight:550; padding:11px 18px; border-radius:12px; opacity:0; pointer-events:none;
    transition:opacity .18s var(--ease), transform .18s var(--ease);
    box-shadow:0 8px 24px rgba(0,0,0,0.45); z-index:20; max-width:82vw; text-align:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* Motion opt-out */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <button class="back" id="backBtn" aria-label="Back">‹</button>
    <div class="titles"><h1 id="title">Fleet</h1><div class="sub" id="sub"></div></div>
    <button class="bell" id="bell" aria-label="Enable notifications" hidden>&#128276;</button>
    <span class="dot" id="dot" title="connection"></span>
  </header>

  <main id="main"></main>

  <section id="chat">
    <div id="transcript"></div>
    <div id="chatDecision"></div>
    <div id="composer">
      <textarea id="msg" rows="1" placeholder="Message…" autocomplete="off"></textarea>
      <button id="send" aria-label="Send">↑</button>
    </div>
  </section>

  <nav id="nav">
    <button data-tab="fleet" class="active"><span class="ni">▦</span>Fleet</button>
    <button data-tab="needs"><span class="ni">◎</span>Needs You<span class="pill" id="needPill">0</span></button>
    <button data-tab="spawn"><span class="ni">＋</span>Spawn</button>
  </nav>
</div>
<div id="toast" class="toast"></div>

<script>
(() => {
  const qs = new URLSearchParams(location.search);
  let token = qs.get('token') || localStorage.getItem("hubToken") || '';
  if (token) localStorage.setItem("hubToken", token);

  // A notification tap deep-links to an agent: /m?agent=<id>, or a postMessage
  // from the service worker into an already-open window. Opened once its
  // snapshot is known (see maybeOpenPending).
  let pendingAgent = qs.get('agent') || '';

  const $ = (id) => document.getElementById(id);
  const hdr = $('hdr'), titleEl = $('title'), subEl = $('sub'), dot = $('dot'), bell = $('bell');
  const main = $('main'), chatEl = $('chat'), transcript = $('transcript');
  const chatDecision = $('chatDecision'), nav = $('nav'), needPill = $('needPill');
  const msgEl = $('msg'), sendBtn = $('send'), backBtn = $('backBtn'), toastEl = $('toast');

  // ── transport (hub bus over /bus) ──────────────────────────────────────────
  let ws = null, callSeq = 0, backoff = 500, reconnectTimer = null, reconcileTimer = null, watchdog = null, lastActivity = 0;
  const calls = new Map();
  const STALE_MS = 30000;

  // Live session snapshots, keyed by sessionId. Each is a full
  // ClaudeSessionSnapshot (conversation, pendingApproval, pendingQuestions,
  // ambientState, usage, …) — the single source every view renders from.
  const sessions = new Map();
  let cfg = null;               // cached config.get (spawn defaults + dirs)
  let view = { name: 'fleet' };  // {name:'fleet'|'needs'|'spawn'|'chat', sessionId?}
  const picks = new Map();       // per-question option picks in the open decision
  const resolvedQs = new Map();  // sessionId -> [{sig, anchorLen, questions, answers, declined}]

  function esc(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function basename(p) { p = String(p || '').replace(/[\/\\]+$/, ''); const i = Math.max(p.lastIndexOf('/'), p.lastIndexOf('\\')); return i >= 0 ? p.slice(i + 1) : p; }
  function toast(m) { toastEl.textContent = m; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => toastEl.classList.remove('show'), 2200); }
  function fmtUSD(n) { n = n || 0; return n >= 0.01 ? '$' + n.toFixed(2) : n > 0 ? '<$0.01' : '$0.00'; }
  function isBlocked(s) { return !!(s && (s.pendingApproval || (s.pendingQuestions && s.pendingQuestions.length))); }
  function isWorking(s) { const a = s && s.ambientState; return isLive(s) && !isBlocked(s) && (a === 'streaming' || a === 'thinking' || a === 'background'); }
  function isLive(s) { return s && s.status !== 'ended'; }
  function agentName(s) { return basename(s.liveCwd || s.cwd) || (s.sessionId || '').slice(0, 8) || 'agent'; }

  function stateChip(s) {
    if (!isLive(s)) return '<span class="chip stop"><span class="cdot"></span>Stopped</span>';
    if (s.pendingApproval) return '<span class="chip approval"><span class="cdot"></span>Needs approval</span>';
    if (s.pendingQuestions && s.pendingQuestions.length) return '<span class="chip question"><span class="cdot"></span>Needs answer</span>';
    const a = s.ambientState;
    if (a === 'streaming' || a === 'thinking') return '<span class="chip work"><span class="cdot"></span>Working</span>';
    if (a === 'background') return '<span class="chip work"><span class="cdot"></span>Background work</span>';
    return '<span class="chip idle"><span class="cdot"></span>Idle</span>';
  }
  function ctxPct(s) {
    const u = s.usage; if (!u || !u.contextLimit) return -1;
    return Math.min(100, Math.round((u.contextTokens / u.contextLimit) * 100));
  }

  function call(method, params) {
    return new Promise((resolve, reject) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return reject(new Error('offline'));
      const id = 'c' + (++callSeq);
      calls.set(id, { resolve, reject });
      ws.send(JSON.stringify({ op: 'call', id, method, params: params || {} }));
      setTimeout(() => { if (calls.has(id)) { calls.delete(id); reject(new Error('timeout')); } }, 15000);
    });
  }
  function wsURL() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    return `${proto}//${location.host}/bus?token=${encodeURIComponent(token)}`;
  }

  // ── data ───────────────────────────────────────────────────────────────────
  // Two providers can serve snapshots: the desktop app (rich rows, with
  // conversation) and the headless brain (state-only rows marked sparse:true).
  // A sparse row must never clobber a rich one we're rendering, so merge it
  // over what we hold instead of replacing it.
  function fold(snap) {
    const prev = sessions.get(snap.sessionId);
    sessions.set(snap.sessionId, snap.sparse && prev ? Object.assign({}, prev, snap) : snap);
  }
  async function seed() {
    try {
      const list = await call('sessions.snapshots', {});
      const seen = new Set();
      for (const s of (list || [])) if (s && s.sessionId) { seen.add(s.sessionId); fold(s); }
      // The provider's list IS the visible fleet — drop anything it no longer
      // shows (ended sessions, stopped rows the layout stopped curating).
      for (const id of [...sessions.keys()]) if (!seen.has(id)) sessions.delete(id);
      afterData();
    } catch (e) { /* connection dot shows offline */ }
  }
  function upsert(snap) {
    if (!snap || !snap.sessionId) return;
    fold(snap);
    afterData(snap.sessionId);
  }
  function afterData(changedId) {
    pruneConv();
    updateNeedPill();
    maybeOpenPending();
    if (view.name === 'fleet') renderFleet();
    else if (view.name === 'needs') renderNeeds();
    else if (view.name === 'chat' && (!changedId || changedId === view.sessionId)) renderChat();
  }
  // Open the agent a notification pointed us at, as soon as its snapshot lands.
  function maybeOpenPending() {
    if (pendingAgent && sessions.get(pendingAgent)) { const id = pendingAgent; pendingAgent = ''; openChat(id); }
  }
  function updateNeedPill() {
    let n = 0; for (const s of sessions.values()) if (isLive(s) && isBlocked(s)) n++;
    needPill.textContent = n; needPill.classList.toggle('show', n > 0);
  }
  function liveList() {
    return [...sessions.values()].filter(isLive)
      .sort((a, b) => (isBlocked(b) - isBlocked(a)) || (b.lastActivity || 0) - (a.lastActivity || 0));
  }
  // Fleet shows every visible session (the provider applies the shared
  // desktop-sidebar rule: live incl. idle, plus curated/recently-stopped),
  // attention-first: needs-you, then working, then idle, then stopped.
  function fleetRank(s) {
    if (!isLive(s)) return 3;
    if (isBlocked(s)) return 0;
    if (isWorking(s)) return 1;
    return 2;
  }
  function fleetList() {
    return [...sessions.values()]
      .sort((a, b) => (fleetRank(a) - fleetRank(b)) || (b.lastActivity || 0) - (a.lastActivity || 0));
  }

  // ── tabs / navigation ──────────────────────────────────────────────────────
  function setTab(tab) {
    view = { name: tab };
    for (const b of nav.querySelectorAll('button')) b.classList.toggle('active', b.dataset.tab === tab);
    hdr.classList.remove('has-back');
    chatEl.classList.remove('show'); main.style.display = 'block'; nav.style.display = 'flex';
    subEl.textContent = '';
    if (tab === 'fleet') { titleEl.textContent = 'Fleet'; renderFleet(); }
    else if (tab === 'needs') { titleEl.textContent = 'Needs You'; renderNeeds(); }
    else if (tab === 'spawn') { titleEl.textContent = 'New agent'; renderSpawn(); }
    main.scrollTop = 0;
  }

  // ── fleet ──────────────────────────────────────────────────────────────────
  function renderFleet() {
    const list = fleetList();
    if (!list.length) {
      main.innerHTML = `<div class="glow"></div>` +
        emptyHtml('▦', 'No agents yet', 'Spawn one from the desktop or the Spawn tab.');
      return;
    }
    main.innerHTML = list.map(fleetCard).join('');
    for (const el of main.querySelectorAll('.card.tap')) el.onclick = () => openChat(el.dataset.id);
  }
  function fleetCard(s) {
    const bits = [];
    const m = s.usage && s.usage.model; if (m) bits.push(`<span class="mono">${esc(shortModel(m))}</span>`);
    const p = ctxPct(s); if (p >= 0) bits.push(`${p}% ctx`);
    if (s.usage && s.usage.costUSD) bits.push(fmtUSD(s.usage.costUSD));
    if (s.transport === 'stream') bits.push(`<span class="tag">stream</span>`);
    return `<div class="card tap ${isBlocked(s) ? 'blocked' : isWorking(s) ? 'working' : isLive(s) ? '' : 'stopped'}" data-id="${esc(s.sessionId)}">
      <div class="row">
        <div class="grow"><div class="name">${esc(agentName(s))}</div></div>
        ${stateChip(s)}
      </div>
      <div class="path">${esc(s.liveCwd || s.cwd || '')}</div>
      ${bits.length ? `<div class="meta">${bits.join('<span style="color:var(--disabled)">·</span>')}</div>` : ''}
    </div>`;
  }
  function shortModel(m) { return String(m).replace(/^claude-/, '').replace(/-20\d{6}$/, '').replace(/\[1m\]/, ' 1m'); }

  // ── needs you ──────────────────────────────────────────────────────────────
  function renderNeeds() {
    const list = liveList().filter(isBlocked);
    if (!list.length) { main.innerHTML = emptyHtml('◎', 'All clear', 'Approvals and questions land here the moment an agent needs you.'); return; }
    main.innerHTML = list.map(s =>
      `<div class="card blocked">
        <div class="row"><div class="grow"><div class="name">${esc(agentName(s))}</div>
          <div class="path">${esc(s.liveCwd || s.cwd || '')}</div></div>
          <button class="btn open" data-open="${esc(s.sessionId)}">Open</button></div>
        ${decisionHtml(s)}
      </div>`).join('');
    bindDecisions(main);
    for (const b of main.querySelectorAll('[data-open]')) b.onclick = () => openChat(b.dataset.open);
  }

  // ── decision (approval / questions) rendering + binding ─────────────────────
  function decisionHtml(s) {
    if (s.pendingApproval) {
      const a = s.pendingApproval;
      return `<div class="decision" data-id="${esc(s.sessionId)}" data-kind="approval">
        <div class="q">Approve <span class="tool">${esc(a.toolName)}</span>?</div>
        <div class="inp">${esc(summarizeInput(a.toolInput))}</div>
        <div class="btns">
          <button class="btn good" data-d="yes">Approve</button>
          <button class="btn" data-d="always">Always</button>
          <button class="btn danger" data-d="no">Deny</button>
        </div>
      </div>`;
    }
    if (s.pendingQuestions && s.pendingQuestions.length) {
      const groups = s.pendingQuestions.map((q, qi) => {
        const opts = (q.options || []).map((o, oi) =>
          `<button class="qopt" data-q="${qi}" data-opt="${oi + 1}">` +
            `<span class="qnum">${oi + 1}</span>` +
            `<span class="qtext"><span class="qlabel">${esc(o.label)}</span>` +
            `${o.description ? `<span class="qdesc">${esc(o.description)}</span>` : ''}</span>` +
          `</button>`).join('');
        return `<div class="qgroup"><div class="q">${esc(q.question)}</div>${opts}</div>`;
      }).join('');
      const multi = s.pendingQuestions.length > 1;
      return `<div class="decision" data-id="${esc(s.sessionId)}" data-kind="question" data-n="${s.pendingQuestions.length}">
        ${groups}
        ${multi ? `<div class="btns"><button class="btn primary" data-submit>Submit answers</button></div>` : ''}
        <div class="qdecline"><button data-decline>Decline &amp; stop</button></div>
      </div>`;
    }
    return '';
  }
  function bindDecisions(root) {
    for (const d of root.querySelectorAll('.decision')) {
      const id = d.dataset.id;
      if (d.dataset.kind === 'approval') {
        for (const b of d.querySelectorAll('[data-d]')) b.onclick = () => approve(id, b.dataset.d);
      } else if (d.dataset.kind === 'question') {
        const n = Number(d.dataset.n || 1);
        for (const b of d.querySelectorAll('[data-opt]')) {
          b.onclick = () => {
            const qi = Number(b.dataset.q);
            picks.set(id + ':' + qi, Number(b.dataset.opt));
            for (const sib of d.querySelectorAll(`[data-q="${qi}"]`)) sib.classList.toggle('picked', sib === b);
            if (n === 1) submitAnswers(id, d);   // single question → answer immediately
          };
        }
        const sub = d.querySelector('[data-submit]');
        if (sub) sub.onclick = () => submitAnswers(id, d);
        const dec = d.querySelector('[data-decline]');
        if (dec) dec.onclick = () => declineQuestion(id);
      }
    }
  }
  function summarizeInput(input) {
    if (input == null) return '';
    if (typeof input === 'string') return input;
    const o = input;
    if (o.command) return o.command;
    if (o.file_path) return o.file_path + (o.content ? '\n' + String(o.content).slice(0, 400) : '');
    if (o.path) return o.path;
    if (o.url) return o.url;
    if (o.pattern) return o.pattern;
    try { return JSON.stringify(o, null, 2).slice(0, 600); } catch { return String(o); }
  }

  // ── actions ────────────────────────────────────────────────────────────────
  function approve(id, decision) {
    call('claude.approve', { sessionId: id, decision })
      .then(() => toast(decision === 'no' ? 'Denied' : 'Approved'))
      .catch(e => toast('Failed: ' + (e.message || e)));
  }
  function submitAnswers(id, decisionEl) {
    const n = Number(decisionEl.dataset.n || 1);
    const answers = [];
    for (let qi = 0; qi < n; qi++) {
      const pick = picks.get(id + ':' + qi);
      if (!pick) { toast('Pick an option for every question'); return; }
      answers.push(String(pick));   // daemon maps 1-indexed picks → option labels
    }
    // Capture the question set + anchor now — the snapshot may clear
    // pendingQuestions before the call resolves.
    const s = sessions.get(id);
    const questions = (s && s.pendingQuestions) || [];
    const anchorLen = s ? convTurns(s).length : 0;
    call('claude.answer', { sessionId: id, answers })
      .then(() => {
        recordResolved(id, false, describeAnswers(questions, answers), questions, anchorLen);
        toast('Answered');
        for (let qi = 0; qi < n; qi++) picks.delete(id + ':' + qi);
        if (view.name === 'chat' && view.sessionId === id) renderChat();
      })
      .catch(e => toast('Failed: ' + (e.message || e)));
  }

  // Decline the pending question(s): leave a "declined" trace in the transcript
  // and cancel the agent's turn (SIGINT) — mirrors the desktop decline.
  function declineQuestion(id) {
    const s = sessions.get(id);
    const questions = (s && s.pendingQuestions) || [];
    const anchorLen = s ? convTurns(s).length : 0;
    recordResolved(id, true, null, questions, anchorLen);
    call('claude.signal', { sessionId: id, signal: 'SIGINT' })
      .then(() => toast('Declined')).catch(e => toast('Failed: ' + (e.message || e)));
    if (view.name === 'chat' && view.sessionId === id) renderChat();
  }

  // ── resolved-question records (persistent chat cards) ───────────────────────
  // Kept client-side, keyed by sessionId and anchored by conversation length, so
  // they survive the snapshot rebuilds that replace s.conversation wholesale.
  function recordResolved(id, declined, answers, questions, anchorLen) {
    if (!questions || !questions.length) return;
    const sig = questions.map(q => q.question).join('␀');
    const list = resolvedQs.get(id) || [];
    if (list.some(r => r.sig === sig && r.anchorLen === anchorLen)) return;
    list.push({ sig, anchorLen, questions, answers, declined });
    resolvedQs.set(id, list);
  }
  // Map raw 1-indexed picks back to their option labels for display.
  function describeAnswers(questions, raw) {
    return (raw || []).map((a, i) => {
      const n = Number(a), q = questions[i];
      if (Number.isInteger(n) && String(n) === a && q && q.options && q.options[n - 1]) return q.options[n - 1].label;
      return a;
    });
  }
  function answeredCardHtml(r) {
    if (r.declined) {
      const body = r.questions.length > 1
        ? `You declined ${r.questions.length} questions — the turn was cancelled.`
        : 'You declined to answer — the turn was cancelled.';
      return `<div class="aqcard declined"><div class="aqhead">⊘ Declined</div><div class="aqbody">${esc(body)}</div></div>`;
    }
    const rows = r.questions.map((q, i) =>
      `<div class="aqrow"><div class="aqq">${esc(q.question)}</div>` +
      `<div class="aqa">↳ ${esc((r.answers && r.answers[i]) || '—')}</div></div>`).join('');
    return `<div class="aqcard"><div class="aqhead">✓ You answered</div><div class="aqbody">${rows}</div></div>`;
  }
  // Interleave answered-question cards with the conversation turns at their anchor.
  function transcriptHtml(s) {
    const turns = convTurns(s);
    const cards = resolvedQs.get(s.sessionId) || [];
    const byAnchor = new Map();
    for (const r of cards) {
      const a = Math.max(0, Math.min(r.anchorLen, turns.length));
      let arr = byAnchor.get(a); if (!arr) { arr = []; byAnchor.set(a, arr); } arr.push(r);
    }
    const parts = [];
    for (let i = 0; i <= turns.length; i++) {
      const cs = byAnchor.get(i);
      if (cs) for (const r of cs) parts.push(answeredCardHtml(r));
      if (i < turns.length) parts.push(turnHtml(turns[i]));
    }
    return parts.join('');
  }

  // ── fetched conversation (headless serve) ───────────────────────────────────
  // The brain's snapshots are state-only (sparse:true, no conversation): the
  // transcript lives behind the sessions.conversation bus method instead, which
  // both providers proxy to claudemon's GET /sessions/:id/conversation —
  // { session_id?, seq, items: [{kind: user_message|assistant_text|tool_use|
  // tool_result|usage|plan, …}] }. When the open chat's snapshot carries no
  // conversation we fetch the items and fold them into desktop-shaped turns
  // here; every agent.snapshot event for the open session re-renders the chat,
  // which schedules a cheap incremental refetch (sinceSeq cursor). Rich desktop
  // snapshots keep winning: convTurns prefers the embedded conversation.
  const fetchedConv = new Map(); // sessionId -> {seq, turns, toolIds, at, inflight, timer}
  const CONV_REFRESH_MS = 1000;  // min gap between refetches per session

  function convTurns(s) {
    if (s.conversation && s.conversation.length) return s.conversation;
    const st = fetchedConv.get(s.sessionId);
    return (st && st.turns) || [];
  }
  function needsConvFetch(s) { return !!(s && !(s.conversation && s.conversation.length)); }
  function convState(id) {
    let st = fetchedConv.get(id);
    if (!st) { st = { seq: 0, turns: [], toolIds: new Set(), at: 0, inflight: false, timer: null }; fetchedConv.set(id, st); }
    return st;
  }
  // Drop cached transcripts for sessions the provider no longer shows.
  function pruneConv() {
    for (const [id, st] of fetchedConv) if (!sessions.has(id)) { clearTimeout(st.timer); fetchedConv.delete(id); }
  }
  function scheduleConvRefresh(id) {
    const st = convState(id);
    if (st.inflight || st.timer) return;
    const wait = Math.max(0, st.at + CONV_REFRESH_MS - Date.now());
    st.timer = setTimeout(() => { st.timer = null; fetchConv(id); }, wait);
  }
  async function fetchConv(id) {
    if (!sessions.has(id)) { fetchedConv.delete(id); return; }
    const st = convState(id);
    if (st.inflight) return;
    st.inflight = true;
    let changed = false;
    try {
      const params = { sessionId: id };
      if (st.seq > 0) params.sinceSeq = st.seq;
      const r = await call('sessions.conversation', params);
      st.at = Date.now();
      const seq = (r && typeof r.seq === 'number') ? r.seq : 0;
      const items = (r && Array.isArray(r.items)) ? r.items : [];
      if (st.seq > 0 && seq < st.seq) {
        // The daemon rebuilt its log (seq went backwards) — resync from scratch.
        st.seq = 0; st.turns = []; st.toolIds = new Set(); st.inflight = false;
        return fetchConv(id);
      }
      changed = items.length > 0 || st.seq === 0;
      st.seq = seq;
      if (items.length) applyConvItems(st, items, sessions.get(id));
    } catch (e) { st.at = Date.now(); /* offline/timeout — next snapshot event retries */ }
    st.inflight = false;
    // Render after clearing inflight so renderChat can arm a trailing refetch —
    // the tailer can flush the turn's last text shortly after the state tick.
    if (changed && view.name === 'chat' && view.sessionId === id) renderChat();
  }
  // Fold daemon conversation items into the turn shape turnHtml renders
  // ({role, content, toolCalls: [{id, name, input, status}]}) — a client-side
  // miniature of the desktop's conversationApplier. usage/plan items carry no
  // transcript content and are skipped.
  function applyConvItems(st, items, s) {
    // Managed adapters stream assistant text as growing snapshots or deltas —
    // coalesce into the open bubble; PTY claude emits whole blocks that can
    // repeat around compaction — dedup instead (same rule as the desktop).
    const streaming = !!s && (s.transport === 'stream' || (s.provider && s.provider !== 'claude'));
    for (const it of items) {
      const kind = it.kind || it.type;
      if (kind === 'user_message') {
        const text = it.text || '';
        if (text && !isDupTurn(st.turns, 'user', text)) st.turns.push({ role: 'user', content: text });
      } else if (kind === 'assistant_text') {
        const text = it.text || '';
        if (!text) continue;
        const last = st.turns[st.turns.length - 1];
        if (streaming && last && last.role === 'assistant' && !(last.toolCalls && last.toolCalls.length)) {
          if (last.content && text.startsWith(last.content)) last.content = text; // growing snapshot
          else last.content += text;                                              // incremental delta
        } else if (!isDupTurn(st.turns, 'assistant', text)) {
          st.turns.push({ role: 'assistant', content: text });
        }
      } else if (kind === 'tool_use') {
        const tid = it.id || '';
        if (tid && st.toolIds.has(tid)) continue;   // resync replay — ids are globally unique
        if (tid) st.toolIds.add(tid);
        st.turns.push({ role: 'assistant', content: '', toolCalls: [{ id: tid, name: it.name || 'tool', input: it.input, status: 'complete' }] });
      } else if (kind === 'tool_result' && it.tool_use_id) {
        for (let i = st.turns.length - 1; i >= 0; i--) {  // results follow their calls closely
          const tc = (st.turns[i].toolCalls || []).find(t => t.id === it.tool_use_id);
          if (tc) { if (it.is_error) tc.status = 'failed'; break; }
        }
      }
    }
  }
  function isDupTurn(turns, role, content) {
    return turns.slice(-5).some(t => t.role === role && t.content === content);
  }

  // ── chat ───────────────────────────────────────────────────────────────────
  function openChat(id) {
    const s = sessions.get(id); if (!s) return;
    view = { name: 'chat', sessionId: id };
    for (const b of nav.querySelectorAll('button')) b.classList.remove('active');
    hdr.classList.add('has-back'); main.style.display = 'none'; nav.style.display = 'none';
    chatEl.classList.add('show');
    renderChat(true);
    msgEl.focus();
  }
  function renderChat(scrollBottom) {
    const s = sessions.get(view.sessionId);
    if (!s) { setTab('fleet'); return; }
    titleEl.textContent = agentName(s);
    subEl.innerHTML = stateChip(s) + (s.transport === 'stream' ? ' <span class="tag">stream</span>' : '');
    // Snapshot has no embedded conversation (headless brain) — fetch/refresh
    // the transcript over the bus. renderChat runs on every agent.snapshot for
    // this session, so this doubles as the live-refetch trigger (throttled).
    if (needsConvFetch(s)) scheduleConvRefresh(s.sessionId);

    const atBottom = scrollBottom || (transcript.scrollHeight - transcript.scrollTop - transcript.clientHeight < 60);
    const body = transcriptHtml(s);   // turns + answered-question cards, interleaved
    const parts = [];
    if (body) parts.push(body);
    if (isWorking(s)) parts.push(thinkingHtml());   // BrandSpinner while responding
    transcript.innerHTML = parts.length
      ? parts.join('')
      : `<div class="empty"><div class="big">No messages yet</div><div class="small">Say something to get things moving.</div></div>`;
    chatDecision.innerHTML = isBlocked(s) ? decisionHtml(s) : '';
    if (chatDecision.firstChild) bindDecisions(chatDecision);
    if (atBottom) transcript.scrollTop = transcript.scrollHeight;
    sendBtn.disabled = !isLive(s);
  }
  function turnHtml(t) {
    const isUser = t.role === 'user';
    // User text stays literal (matches the desktop app, which only markdown-
    // renders assistant turns); the .bubble's pre-wrap preserves its newlines.
    let inner = isUser ? esc(t.content || '') : renderMarkdown(t.content || '');
    if (t.toolCalls && t.toolCalls.length) inner += t.toolCalls.map(toolChip).join('');
    if (!inner.trim()) return '';
    return `<div class="turn ${isUser ? 'user' : 'assistant'}"><div class="bubble ${isUser ? '' : 'md'}">${inner}</div></div>`;
  }
  function toolChip(tc) {
    return `<div class="toolchip"><span class="tn">${esc(tc.name)}</span>` +
      `<span class="ti">${esc(oneLine(summarizeInput(tc.input)))}</span>` +
      `<span class="sd ${esc(tc.status || 'complete')}"></span></div>`;
  }
  function oneLine(s) { return String(s || '').split('\n')[0].slice(0, 80); }
  // The desktop {␣} BrandSpinner, shown while the agent is streaming/thinking.
  function thinkingHtml() {
    return `<div class="turn assistant"><div class="thinking">` +
      `<span class="brand">{<span class="track"><span class="bar"></span></span>}</span></div></div>`;
  }

  // ── safe markdown → HTML (self-contained, mirrors the desktop feature set) ───
  // Everything is escaped before it reaches the DOM; only the tags we emit here
  // are ever unescaped. Supports: #-#### headings, **bold**, *italic*, `code`,
  // ```fences```, - / * / 1. lists, > quotes, --- rules, and [text](url) links.
  function safeUrl(u) { u = String(u || '').trim(); return /^(https?:|mailto:|\/)/i.test(u) ? u : null; }
  function renderInline(text, depth) {
    depth = depth || 0;
    const re = /(\*\*([\s\S]+?)\*\*|\*([^*\n]+?)\*|`([^`]+)`|\[([^\]]+)\]\(([^)\s]+)\))/g;
    let out = '', last = 0, m;
    while ((m = re.exec(text))) {
      out += esc(text.slice(last, m.index));
      if (m[2] !== undefined) out += `<strong>${depth < 4 ? renderInline(m[2], depth + 1) : esc(m[2])}</strong>`;
      else if (m[3] !== undefined) out += `<em>${depth < 4 ? renderInline(m[3], depth + 1) : esc(m[3])}</em>`;
      else if (m[4] !== undefined) out += `<code>${esc(m[4])}</code>`;
      else {
        const url = safeUrl(m[6]), label = depth < 4 ? renderInline(m[5], depth + 1) : esc(m[5]);
        out += url ? `<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${label}</a>` : label;
      }
      last = re.lastIndex;
    }
    return out + esc(text.slice(last));
  }
  const RE_FENCE = /^\s*```/, RE_HEAD = /^(#{1,4})\s+(.+)$/, RE_HR = /^\s*([-*_])(\s*\1){2,}\s*$/,
        RE_QUOTE = /^\s*>/, RE_LI = /^\s*([-*+]|\d+[.)])\s+/, RE_OL = /^\s*\d+[.)]\s+/;
  function isBlockStart(l) { return RE_FENCE.test(l) || RE_HEAD.test(l) || RE_HR.test(l) || RE_QUOTE.test(l) || RE_LI.test(l); }
  function renderMarkdown(text) {
    const lines = String(text).replace(/\r\n?/g, '\n').split('\n');
    const out = [];
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      if (RE_FENCE.test(line)) {                              // fenced code (unclosed → to end, for streaming)
        i++; const buf = [];
        while (i < lines.length && !RE_FENCE.test(lines[i])) { buf.push(lines[i]); i++; }
        if (i < lines.length) i++;
        out.push(`<pre>${esc(buf.join('\n'))}</pre>`); continue;
      }
      const h = RE_HEAD.exec(line);
      if (h) { const n = h[1].length; out.push(`<h${n} class="md-h">${renderInline(h[2].trim())}</h${n}>`); i++; continue; }
      if (RE_HR.test(line)) { out.push('<hr class="md-hr">'); i++; continue; }
      if (RE_QUOTE.test(line)) {
        const buf = [];
        while (i < lines.length && RE_QUOTE.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/, '')); i++; }
        out.push(`<blockquote class="md-q">${renderInline(buf.join(' '))}</blockquote>`); continue;
      }
      if (RE_LI.test(line)) {
        const ordered = RE_OL.test(line), items = [];
        while (i < lines.length && RE_LI.test(lines[i])) {
          items.push(`<li>${renderInline(lines[i].replace(RE_LI, ''))}</li>`); i++;
        }
        const tag = ordered ? 'ol' : 'ul';
        out.push(`<${tag} class="md-list">${items.join('')}</${tag}>`); continue;
      }
      if (!line.trim()) { i++; continue; }
      const buf = [];
      while (i < lines.length && lines[i].trim() && !isBlockStart(lines[i])) { buf.push(lines[i]); i++; }
      out.push(`<p class="md-p">${renderInline(buf.join('\n')).replace(/\n/g, '<br>')}</p>`);
    }
    return out.join('');
  }

  function sendMessage() {
    if (view.name !== 'chat') return;
    const text = (msgEl.value || '').trim(); if (!text) return;
    sendBtn.disabled = true;
    call('agents.sendMessage', { sessionId: view.sessionId, text })
      .then(() => { msgEl.value = ''; autosize(); toast('Sent'); })
      .catch(e => toast('Send failed: ' + (e.message || e)))
      .finally(() => { sendBtn.disabled = false; });
  }
  function autosize() { msgEl.style.height = 'auto'; msgEl.style.height = Math.min(msgEl.scrollHeight, 120) + 'px'; }

  // ── spawn ──────────────────────────────────────────────────────────────────
  const PROVIDERS = [['claude', 'Claude'], ['codex', 'Codex'], ['opencode', 'OpenCode'], ['pi', 'Pi']];
  let spawnState = { cwd: '', provider: 'claude', model: '' };
  function renderSpawn() {
    const dirs = cfg && cfg.directories || {};
    const favs = dirs.favourites || [], recent = (dirs.recent || []).filter(d => !(favs.includes(d)));
    const quick = [...favs, ...recent].slice(0, 8);
    if (!spawnState.provider) spawnState.provider = (cfg && cfg.agents && cfg.agents.defaultProvider) || 'claude';
    main.innerHTML = `<div class="glow"></div><div class="form">
      <div class="field">
        <div class="label">Working directory</div>
        <input id="spCwd" type="text" placeholder="/path/to/project" value="${esc(spawnState.cwd)}" />
        ${quick.length ? `<div class="chips">${quick.map(d => `<button class="chipbtn" data-dir="${esc(d)}">${esc(basename(d))}</button>`).join('')}</div>` : ''}
      </div>
      <div class="field">
        <div class="label">Harness</div>
        <div class="seg">${PROVIDERS.map(([v, l]) => `<button data-prov="${v}" class="${spawnState.provider === v ? 'on' : ''}">${l}</button>`).join('')}</div>
      </div>
      <div class="field">
        <div class="label">Model <span style="text-transform:none;color:var(--faint);font-weight:400">(optional)</span></div>
        <input id="spModel" type="text" placeholder="blank = default" value="${esc(spawnState.model)}" />
      </div>
      <button class="spawnBtn" id="spGo">Spawn agent</button>
      <div class="note">◆ Runs in stream mode (chat, no terminal).</div>
    </div>`;
    $('spCwd').oninput = e => spawnState.cwd = e.target.value;
    $('spModel').oninput = e => spawnState.model = e.target.value;
    for (const b of main.querySelectorAll('[data-dir]')) b.onclick = () => { spawnState.cwd = b.dataset.dir; $('spCwd').value = b.dataset.dir; };
    for (const b of main.querySelectorAll('[data-prov]')) b.onclick = () => { spawnState.provider = b.dataset.prov; renderSpawn(); };
    $('spGo').onclick = doSpawn;
  }
  function doSpawn() {
    const cwd = (spawnState.cwd || '').trim();
    if (!cwd) { toast('Enter a working directory'); return; }
    const btn = $('spGo'); btn.disabled = true; btn.textContent = 'Spawning…';
    const opts = { cwd, provider: spawnState.provider, transport: 'stream' };
    if ((spawnState.model || '').trim()) opts.model = spawnState.model.trim();
    call('agents.spawn', opts)
      .then(r => {
        const id = r && r.sessionId;
        toast('Spawned');
        spawnState = { cwd: '', provider: spawnState.provider, model: '' };
        if (id) { setTimeout(() => { seed().then(() => { if (sessions.get(id)) openChat(id); else setTab('fleet'); }); }, 400); }
        else setTab('fleet');
      })
      .catch(e => { toast('Spawn failed: ' + (e.message || e)); btn.disabled = false; btn.textContent = 'Spawn agent'; });
  }

  // ── misc render helpers ─────────────────────────────────────────────────────
  function emptyHtml(ic, big, small) {
    return `<div class="empty"><div class="ic">${ic}</div><div class="big">${esc(big)}</div><div class="small">${esc(small)}</div></div>`;
  }

  // ── Web Push (background "needs you" notifications) ─────────────────────────
  // A PWA can't hold a socket open in the background, so we register for Web
  // Push instead: the hub sends one when an agent needs you, the service worker
  // wakes to show a lock-screen notification, and tapping it deep-links here.
  const pushOk = 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
  let swReg = null;
  function updateBell() {
    if (!pushOk) { bell.hidden = true; return; }
    bell.hidden = false;
    bell.classList.toggle('on', Notification.permission === 'granted');
  }
  function urlB64ToUint8(b64) {
    const pad = '='.repeat((4 - (b64.length % 4)) % 4);
    const s = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
    const raw = atob(s), arr = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }
  async function registerSW() {
    if (!pushOk) return null;
    if (swReg) return swReg;
    try { swReg = await navigator.serviceWorker.register('/sw.js'); return swReg; } catch { return null; }
  }
  // Subscribe this device for push and register the subscription with the hub.
  // `silent` skips the permission prompt + toasts — used on connect to refresh
  // an existing grant (e.g. after the hub restarted and lost the subscription).
  async function ensurePush(silent) {
    if (!pushOk) { if (!silent) toast('Push not supported here'); return; }
    if (Notification.permission === 'denied') { if (!silent) toast('Notifications are blocked in settings'); return; }
    if (Notification.permission !== 'granted') {
      if (silent) return;
      if ((await Notification.requestPermission()) !== 'granted') { updateBell(); return; }
    }
    const reg = await registerSW(); if (!reg) return;
    try {
      let sub = await reg.pushManager.getSubscription();
      if (!sub) {
        const r = await call('push.key', {});
        if (!r || !r.publicKey) return;
        sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8(r.publicKey) });
      }
      await call('push.subscribe', sub.toJSON());
      updateBell();
      if (!silent) toast('Notifications on');
    } catch (e) { if (!silent) toast("Couldn't enable: " + (e.message || e)); }
  }

  // ── connection ──────────────────────────────────────────────────────────────
  function setConnected(on) { dot.classList.toggle('on', on); }
  function gate() {
    nav.style.display = 'none'; chatEl.classList.remove('show'); main.style.display = 'block';
    hdr.classList.remove('has-back'); titleEl.textContent = 'Workspacer'; subEl.textContent = '';
    main.innerHTML = `<div class="glow"></div><div class="gate"><h2>Connect</h2>
      <p>Paste your workspacer remote token.</p>
      <input id="tok" placeholder="token" autocomplete="off" />
      <button id="tokGo">Connect</button></div>`;
    $('tokGo').onclick = () => { const v = ($('tok').value || '').trim(); if (!v) return; token = v; localStorage.setItem("hubToken", v); connect(); };
    $('tok').addEventListener('keydown', e => { if (e.key === 'Enter') $('tokGo').click(); });
  }
  // Detach + close a socket without letting its late close/error callbacks run
  // (they'd race a newer connection). Safe to call on any socket.
  function killSocket(sock) {
    if (!sock) return;
    try { sock.onopen = sock.onmessage = sock.onerror = sock.onclose = null; sock.close(); } catch {}
  }
  function connect() {
    if (!token) return gate();
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    clearTimeout(watchdog);
    setConnected(false);
    let sock;
    try { sock = new WebSocket(wsURL()); } catch { return scheduleReconnect(); }
    ws = sock;
    // Phones routinely hand us a WebSocket whose handshake hangs — the host or
    // the Tailscale link was asleep, so it neither opens nor errors and the OS
    // won't give up for 30–75s. Without this we'd sit "connecting" that whole
    // time. If onopen hasn't fired quickly, abandon it and retry.
    watchdog = setTimeout(() => {
      if (sock.readyState !== WebSocket.OPEN) { killSocket(sock); if (ws === sock) ws = null; scheduleReconnect(); }
    }, 4500);
    sock.onopen = () => {
      clearTimeout(watchdog);
      backoff = 500; lastActivity = Date.now(); setConnected(true);
      sock.send(JSON.stringify({ op: 'subscribe', topics: ['agent.snapshot'] }));
      if (!cfg) call('config.get', {}).then(c => { cfg = c; }).catch(() => {});
      seed();
      // Refresh a prior push grant against the (possibly restarted) hub.
      if (pushOk && Notification.permission === 'granted') ensurePush(true);
      // Reconcile every 25s so the fleet self-heals if an event was missed while
      // the socket blipped. Doubles as a heartbeat that keeps lastActivity fresh
      // (< STALE_MS) so wake() won't needlessly tear down a healthy idle socket.
      clearInterval(reconcileTimer);
      reconcileTimer = setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) seed(); }, 25000);
    };
    sock.onmessage = (ev) => {
      lastActivity = Date.now();
      let f; try { f = JSON.parse(ev.data); } catch { return; }
      if (f.op === 'result') { const c = calls.get(f.id); if (c) { calls.delete(f.id); c.resolve(f.result); } }
      else if (f.op === 'error' && f.id) { const c = calls.get(f.id); if (c) { calls.delete(f.id); c.reject(new Error(f.error || 'error')); } }
      else if (f.op === 'event' && f.event) {
        const t = f.event.type || '';
        // agent.snapshot carries the full snapshot — apply it incrementally.
        // A periodic seed() (below) reconciles anything missed (e.g. a session
        // that vanished without a final ended snapshot).
        if (t === 'agent.snapshot' && f.event.data && f.event.data.sessionId) upsert(f.event.data);
      }
    };
    sock.onclose = (ev) => {
      clearTimeout(watchdog);
      if (ws === sock) ws = null;
      setConnected(false);
      if (ev.code === 1008 || ev.code === 4401) { token = ''; localStorage.removeItem("hubToken"); return gate(); }
      scheduleReconnect();
    };
    sock.onerror = () => { try { sock.close(); } catch {} };
  }
  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, backoff);
    backoff = Math.min(backoff * 2, 5000);
  }
  // Mobile browsers suspend a backgrounded tab's socket (often without ever
  // firing close), so on return we'd sit on a dead socket. Reconnect on every
  // signal that we're foreground again — visibility, bfcache restore (pageshow),
  // window focus, and network-online — unless the socket is provably still live.
  function wake() {
    if (!token || document.visibilityState === 'hidden') return;
    const live = ws && ws.readyState === WebSocket.OPEN && Date.now() - lastActivity < STALE_MS;
    if (live) return;
    backoff = 500;
    clearTimeout(watchdog);
    killSocket(ws); ws = null; connect();
  }
  document.addEventListener('visibilitychange', wake);
  window.addEventListener('online', wake);
  window.addEventListener('focus', wake);
  window.addEventListener('pageshow', wake);   // iOS Safari bfcache restore

  // ── wiring ──────────────────────────────────────────────────────────────────
  for (const b of nav.querySelectorAll('button')) b.onclick = () => setTab(b.dataset.tab);
  backBtn.onclick = () => setTab('fleet');
  bell.onclick = () => ensurePush(false);
  sendBtn.onclick = sendMessage;

  // PWA: register the service worker up front (enables push after a grant and
  // caches the shell), reflect notification state on the bell, and let a
  // notification tap deep-link into an already-open window.
  updateBell();
  if (pushOk) {
    registerSW();
    navigator.serviceWorker.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'open-agent' && e.data.sessionId) { pendingAgent = e.data.sessionId; maybeOpenPending(); }
    });
  }
  msgEl.addEventListener('input', autosize);
  msgEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  // iOS software keyboard: expose its height as --kb so the composer floats above it.
  if (window.visualViewport) {
    const vv = window.visualViewport;
    const applyKb = () => {
      const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty('--kb', (kb > 80 ? kb : 0) + 'px');
      if (view.name === 'chat') transcript.scrollTop = transcript.scrollHeight;
    };
    vv.addEventListener('resize', applyKb); vv.addEventListener('scroll', applyKb); applyKb();
  }

  connect();
})();
</script>
</body>
</html>
