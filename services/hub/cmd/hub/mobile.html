<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#18181b" />
<meta name="format-detection" content="telephone=no" />
<title>Workspacer Mobile</title>
<style>
  /* Palette mirrors the desktop app's default "dark" theme (src/themes.ts) so
     the phone client reads as the same product as the new-agent screen and the
     dashboard — same blue accent, same raised-card surfaces, same type ramp.
     Self-contained: no xterm, no bundler, no external assets. Every session is
     driven through its snapshot (conversation + pending state) over the hub bus,
     so this works identically for stream-mode and PTY agents with no terminal. */
  :root {
    --bg:#18181b; --raised:#1c1c20; --surface:#1e1e21; --elevated:#202024;
    --input:#141418; --hover:#26262c; --selected:#2d303c;
    --line:#323237; --line-subtle:#2d2d32; --line-input:#37373c;
    --text:#dcdceb; --text2:#c8c8d2; --muted:#8c8c9b; --faint:#787887; --disabled:#5a5a64;
    --accent:#5078c8; --accent-text:#60a5fa; --accent-bg:rgba(96,165,250,0.14);
    --accent-glow:rgba(80,120,200,0.18);
    --success:#4ade80; --error:#f87171; --warning:#facc15;
    --user-bubble:rgba(60,90,160,0.15); --user-border:rgba(60,90,160,0.28);
    --radius:13px; --radius-sm:9px;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
    --mono:"JetBrainsMono Nerd Font Mono","SF Mono",ui-monospace,Menlo,monospace;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font:15px/1.45 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overscroll-behavior-y:none;
  }
  button { font-family:inherit; }
  #app { display:flex; flex-direction:column; height:calc(100dvh - var(--kb,0px)); }

  /* Header */
  header {
    flex:0 0 auto; display:flex; align-items:center; gap:10px;
    padding:calc(11px + var(--safe-t)) 16px 11px; background:var(--raised);
    border-bottom:1px solid var(--line-subtle); position:sticky; top:0; z-index:5;
  }
  header .back {
    border:none; background:var(--elevated); color:var(--text);
    width:34px; height:34px; border-radius:10px; font-size:22px; line-height:1;
    display:none; align-items:center; justify-content:center; flex:0 0 auto;
  }
  header.has-back .back { display:inline-flex; }
  header .titles { flex:1; min-width:0; }
  header h1 { font-size:17px; margin:0; font-weight:650; letter-spacing:-0.01em;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  header .sub { font-size:12px; color:var(--muted); font-weight:400; margin-top:1px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--error); flex:0 0 auto;
    box-shadow:0 0 0 3px rgba(248,113,113,0.12); transition:background .2s,box-shadow .2s; }
  .dot.on { background:var(--success); box-shadow:0 0 0 3px rgba(74,222,128,0.12); }

  /* Scroll area (list views) */
  main { flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:12px 12px calc(14px + var(--safe-b)); position:relative; }

  /* Cards */
  .card {
    background:var(--raised); border:1px solid var(--line-subtle); border-radius:var(--radius);
    padding:14px; margin-bottom:10px; position:relative; overflow:hidden;
  }
  .card.tap:active { background:var(--hover); }
  .card.blocked { border-color:var(--warning); }
  .card.blocked::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--warning);
  }
  .row { display:flex; align-items:center; gap:10px; }
  .grow { flex:1; min-width:0; }
  .name { font-weight:600; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .path { font-family:var(--mono); font-size:11px; color:var(--faint); margin-top:5px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .meta { color:var(--muted); font-size:12px; margin-top:8px; display:flex; gap:6px 12px; flex-wrap:wrap;
    align-items:center; }
  .meta .mono { font-family:var(--mono); font-size:11px; }

  /* State chip */
  .chip { font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; flex:0 0 auto;
    display:inline-flex; align-items:center; gap:6px; }
  .chip .pulse { width:6px; height:6px; border-radius:50%; background:currentColor; }
  .chip.work { color:var(--accent-text); background:var(--accent-bg); }
  .chip.work .pulse { animation:pulse 1.1s ease-in-out infinite; }
  .chip.wait { color:#1a1205; background:var(--warning); }
  .chip.idle { color:var(--muted); background:var(--elevated); }
  .chip.stop { color:var(--faint); background:var(--elevated); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  .badge { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    color:#1a1205; background:var(--warning); padding:2px 7px; border-radius:6px; }
  .tag { font-size:10px; font-weight:600; color:var(--muted); background:var(--elevated);
    padding:2px 7px; border-radius:6px; letter-spacing:.02em; }

  /* Decision block (approvals / questions) */
  .decision { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm);
    padding:12px; margin-top:10px; }
  .decision .q { font-weight:600; font-size:14px; margin-bottom:2px; }
  .decision .tool { font-family:var(--mono); font-size:12px; color:var(--accent-text); }
  .decision .inp { font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-top:6px;
    white-space:pre-wrap; word-break:break-word; max-height:120px; overflow:auto;
    background:var(--input); border:1px solid var(--line-subtle); border-radius:7px; padding:8px; }
  .btns { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .btn { flex:1 1 auto; min-width:76px; border:1px solid var(--line-input); background:var(--elevated);
    color:var(--text); font-size:13px; font-weight:600; padding:10px 12px; border-radius:9px; cursor:pointer; }
  .btn:active { background:var(--hover); }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.danger { color:var(--error); border-color:rgba(248,113,113,0.4); }
  .btn.good { color:var(--success); border-color:rgba(74,222,128,0.4); }
  .btn.opt { flex:1 1 100%; text-align:left; }
  .btn.opt.picked { border-color:var(--accent); background:var(--accent-bg); color:var(--accent-text); }
  .btn .odesc { display:block; font-weight:400; font-size:11.5px; color:var(--muted); margin-top:3px; }
  .qgroup { margin-top:10px; }
  .qgroup:first-child { margin-top:0; }

  /* Chat view */
  #chat { flex:1 1 auto; display:none; flex-direction:column; min-height:0; }
  #chat.show { display:flex; }
  #transcript { flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:14px 12px 8px; }
  .turn { margin-bottom:12px; display:flex; }
  .turn.user { justify-content:flex-end; }
  .bubble { max-width:86%; padding:10px 12px; border-radius:14px; font-size:14.5px; line-height:1.5;
    white-space:pre-wrap; word-break:break-word; }
  .turn.user .bubble { background:var(--user-bubble); border:1px solid var(--user-border);
    border-bottom-right-radius:5px; }
  .turn.assistant .bubble { background:var(--raised); border:1px solid var(--line-subtle);
    border-bottom-left-radius:5px; }
  .bubble pre { background:var(--input); border:1px solid var(--line-subtle); border-radius:8px;
    padding:9px; overflow:auto; font-family:var(--mono); font-size:12px; margin:6px 0; }
  .bubble code { font-family:var(--mono); font-size:12.5px; }
  .toolchip { display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px;
    color:var(--text2); background:var(--elevated); border:1px solid var(--line-subtle);
    border-radius:8px; padding:7px 10px; margin:6px 0; }
  .toolchip .tn { color:var(--accent-text); font-weight:600; flex:0 0 auto; }
  .toolchip .ti { color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .toolchip .sd { width:7px; height:7px; border-radius:50%; flex:0 0 auto; margin-left:auto; }
  .sd.running { background:var(--accent-text); animation:pulse 1.1s ease-in-out infinite; }
  .sd.complete { background:var(--success); }
  .sd.failed { background:var(--error); }

  /* Pinned decision above composer in chat */
  #chatDecision { flex:0 0 auto; padding:0 12px; }
  #chatDecision:empty { display:none; }
  #chatDecision .decision { margin:0 0 10px; }

  /* Composer */
  #composer { flex:0 0 auto; display:flex; gap:8px; align-items:flex-end;
    padding:10px 12px calc(10px + var(--safe-b)); background:var(--raised);
    border-top:1px solid var(--line-subtle); }
  #composer textarea { flex:1; resize:none; border:1px solid var(--line-input); background:var(--input);
    color:var(--text); border-radius:12px; padding:10px 12px; font-size:15px; font-family:inherit;
    max-height:120px; line-height:1.4; }
  #composer textarea:focus { outline:none; border-color:var(--accent); }
  #send { flex:0 0 auto; width:44px; height:44px; border-radius:12px; border:none; background:var(--accent);
    color:#fff; font-size:19px; display:flex; align-items:center; justify-content:center; }
  #send:disabled { opacity:.5; }

  /* Spawn form */
  .form { max-width:560px; margin:0 auto; }
  .field { margin-bottom:16px; }
  .label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em;
    color:var(--faint); margin-bottom:7px; }
  .form input[type=text] { width:100%; border:1px solid var(--line-input); background:var(--input);
    color:var(--text); border-radius:10px; padding:11px 12px; font-size:15px; font-family:var(--mono); }
  .form input:focus { outline:none; border-color:var(--accent); }
  .chips { display:flex; gap:7px; flex-wrap:wrap; margin-top:9px; }
  .chipbtn { border:1px solid var(--line-input); background:var(--elevated); color:var(--text2);
    font-size:12px; font-family:var(--mono); padding:6px 10px; border-radius:8px; cursor:pointer; }
  .chipbtn:active { background:var(--hover); }
  .seg { display:flex; gap:7px; flex-wrap:wrap; }
  .seg button { flex:1 1 auto; min-width:78px; border:1px solid var(--line-input); background:var(--elevated);
    color:var(--text2); font-size:13px; font-weight:600; padding:10px; border-radius:9px; cursor:pointer; }
  .seg button.on { border-color:var(--accent); background:var(--accent-bg); color:var(--accent-text); }
  .note { font-size:12px; color:var(--muted); margin-top:8px; display:flex; align-items:center; gap:7px; }
  .spawnBtn { width:100%; border:none; background:var(--accent); color:#fff; font-size:15px; font-weight:650;
    padding:14px; border-radius:12px; cursor:pointer; margin-top:4px; }
  .spawnBtn:disabled { opacity:.55; }

  /* Empty / gate states */
  .empty { text-align:center; color:var(--muted); padding:56px 20px; }
  .empty .ic { font-size:34px; opacity:.5; }
  .empty .big { font-size:15px; font-weight:600; color:var(--text2); margin-top:12px; }
  .empty .small { font-size:13px; color:var(--faint); margin-top:6px; }
  .glow { position:absolute; top:-10%; left:50%; transform:translateX(-50%); width:460px; height:460px;
    border-radius:50%; pointer-events:none; z-index:0;
    background:radial-gradient(circle, var(--accent-glow) 0%, transparent 65%); }
  .gate { max-width:420px; margin:40px auto; padding:0 8px; text-align:center; position:relative; z-index:1; }
  .gate h2 { font-size:20px; margin:0 0 6px; }
  .gate p { color:var(--muted); font-size:14px; margin:0 0 18px; }
  .gate input { width:100%; border:1px solid var(--line-input); background:var(--input); color:var(--text);
    border-radius:10px; padding:12px; font-size:15px; margin-bottom:10px; font-family:var(--mono); }
  .gate button { width:100%; border:none; background:var(--accent); color:#fff; font-size:15px; font-weight:650;
    padding:13px; border-radius:11px; }

  /* Bottom nav */
  nav { flex:0 0 auto; display:flex; background:var(--raised); border-top:1px solid var(--line-subtle);
    padding-bottom:var(--safe-b); }
  nav button { flex:1; position:relative; border:none; background:none; color:var(--faint);
    font-size:12px; font-weight:600; padding:11px 0 12px; display:flex; flex-direction:column;
    align-items:center; gap:3px; }
  nav button .ni { font-size:19px; line-height:1; }
  nav button.active { color:var(--accent-text); }
  nav .pill { position:absolute; top:5px; left:50%; margin-left:6px; min-width:16px; height:16px;
    padding:0 4px; border-radius:8px; background:var(--warning); color:#1a1205; font-size:10px;
    font-weight:800; display:none; align-items:center; justify-content:center; }
  nav .pill.show { display:inline-flex; }

  /* Toast */
  .toast { position:fixed; left:50%; bottom:calc(76px + var(--safe-b)); transform:translateX(-50%) translateY(10px);
    background:var(--elevated); border:1px solid var(--line); color:var(--text); font-size:13px; font-weight:500;
    padding:9px 15px; border-radius:10px; opacity:0; pointer-events:none; transition:opacity .18s,transform .18s;
    z-index:20; max-width:82vw; text-align:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <button class="back" id="backBtn" aria-label="Back">‹</button>
    <div class="titles"><h1 id="title">Fleet</h1><div class="sub" id="sub"></div></div>
    <span class="dot" id="dot" title="connection"></span>
  </header>

  <main id="main"></main>

  <section id="chat">
    <div id="transcript"></div>
    <div id="chatDecision"></div>
    <div id="composer">
      <textarea id="msg" rows="1" placeholder="Message…" autocomplete="off"></textarea>
      <button id="send" aria-label="Send">↑</button>
    </div>
  </section>

  <nav id="nav">
    <button data-tab="fleet" class="active"><span class="ni">▦</span>Fleet</button>
    <button data-tab="needs"><span class="ni">◎</span>Needs You<span class="pill" id="needPill">0</span></button>
    <button data-tab="spawn"><span class="ni">＋</span>New</button>
  </nav>
</div>
<div id="toast" class="toast"></div>

<script>
(() => {
  const qs = new URLSearchParams(location.search);
  let token = qs.get('token') || sessionStorage.getItem('hubToken') || '';
  if (token) sessionStorage.setItem('hubToken', token);

  const $ = (id) => document.getElementById(id);
  const hdr = $('hdr'), titleEl = $('title'), subEl = $('sub'), dot = $('dot');
  const main = $('main'), chatEl = $('chat'), transcript = $('transcript');
  const chatDecision = $('chatDecision'), nav = $('nav'), needPill = $('needPill');
  const msgEl = $('msg'), sendBtn = $('send'), backBtn = $('backBtn'), toastEl = $('toast');

  // ── transport (hub bus over /bus) ──────────────────────────────────────────
  let ws = null, callSeq = 0, backoff = 500, reconnectTimer = null, reconcileTimer = null, watchdog = null, lastActivity = 0;
  const calls = new Map();
  const STALE_MS = 30000;

  // Live session snapshots, keyed by sessionId. Each is a full
  // ClaudeSessionSnapshot (conversation, pendingApproval, pendingQuestions,
  // ambientState, usage, …) — the single source every view renders from.
  const sessions = new Map();
  let cfg = null;               // cached config.get (spawn defaults + dirs)
  let view = { name: 'fleet' };  // {name:'fleet'|'needs'|'spawn'|'chat', sessionId?}
  const picks = new Map();       // per-question option picks in the open decision

  function esc(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function basename(p) { p = String(p || '').replace(/[\/\\]+$/, ''); const i = Math.max(p.lastIndexOf('/'), p.lastIndexOf('\\')); return i >= 0 ? p.slice(i + 1) : p; }
  function toast(m) { toastEl.textContent = m; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => toastEl.classList.remove('show'), 2200); }
  function fmtUSD(n) { n = n || 0; return n >= 0.01 ? '$' + n.toFixed(2) : n > 0 ? '<$0.01' : '$0.00'; }
  function isBlocked(s) { return !!(s && (s.pendingApproval || (s.pendingQuestions && s.pendingQuestions.length))); }
  function isLive(s) { return s && s.status !== 'ended'; }
  function agentName(s) { return basename(s.liveCwd || s.cwd) || (s.sessionId || '').slice(0, 8) || 'agent'; }

  function stateChip(s) {
    if (!isLive(s)) return '<span class="chip stop">Stopped</span>';
    if (s.pendingApproval) return '<span class="chip wait">Needs approval</span>';
    if (s.pendingQuestions && s.pendingQuestions.length) return '<span class="chip wait">Needs answer</span>';
    const a = s.ambientState;
    if (a === 'streaming' || a === 'thinking') return '<span class="chip work"><span class="pulse"></span>Working</span>';
    return '<span class="chip idle">Idle</span>';
  }
  function ctxPct(s) {
    const u = s.usage; if (!u || !u.contextLimit) return -1;
    return Math.min(100, Math.round((u.contextTokens / u.contextLimit) * 100));
  }

  function call(method, params) {
    return new Promise((resolve, reject) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return reject(new Error('offline'));
      const id = 'c' + (++callSeq);
      calls.set(id, { resolve, reject });
      ws.send(JSON.stringify({ op: 'call', id, method, params: params || {} }));
      setTimeout(() => { if (calls.has(id)) { calls.delete(id); reject(new Error('timeout')); } }, 15000);
    });
  }
  function wsURL() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    return `${proto}//${location.host}/bus?token=${encodeURIComponent(token)}`;
  }

  // ── data ───────────────────────────────────────────────────────────────────
  async function seed() {
    try {
      const list = await call('sessions.snapshots', {});
      sessions.clear();
      for (const s of (list || [])) if (s && s.sessionId) sessions.set(s.sessionId, s);
      afterData();
    } catch (e) { /* connection dot shows offline */ }
  }
  function upsert(snap) {
    if (!snap || !snap.sessionId) return;
    sessions.set(snap.sessionId, snap);
    afterData(snap.sessionId);
  }
  function afterData(changedId) {
    updateNeedPill();
    if (view.name === 'fleet') renderFleet();
    else if (view.name === 'needs') renderNeeds();
    else if (view.name === 'chat' && (!changedId || changedId === view.sessionId)) renderChat();
  }
  function updateNeedPill() {
    let n = 0; for (const s of sessions.values()) if (isLive(s) && isBlocked(s)) n++;
    needPill.textContent = n; needPill.classList.toggle('show', n > 0);
  }
  function liveList() {
    return [...sessions.values()].filter(isLive)
      .sort((a, b) => (isBlocked(b) - isBlocked(a)) || (b.lastActivity || 0) - (a.lastActivity || 0));
  }

  // ── tabs / navigation ──────────────────────────────────────────────────────
  function setTab(tab) {
    view = { name: tab };
    for (const b of nav.querySelectorAll('button')) b.classList.toggle('active', b.dataset.tab === tab);
    hdr.classList.remove('has-back');
    chatEl.classList.remove('show'); main.style.display = 'block'; nav.style.display = 'flex';
    subEl.textContent = '';
    if (tab === 'fleet') { titleEl.textContent = 'Fleet'; renderFleet(); }
    else if (tab === 'needs') { titleEl.textContent = 'Needs You'; renderNeeds(); }
    else if (tab === 'spawn') { titleEl.textContent = 'New agent'; renderSpawn(); }
    main.scrollTop = 0;
  }

  // ── fleet ──────────────────────────────────────────────────────────────────
  function renderFleet() {
    const list = liveList();
    if (!list.length) {
      main.innerHTML = `<div class="glow"></div>` +
        emptyHtml('▦', 'No agents running', 'Tap ＋ New to spawn one.');
      return;
    }
    main.innerHTML = list.map(fleetCard).join('');
    for (const el of main.querySelectorAll('.card.tap')) el.onclick = () => openChat(el.dataset.id);
  }
  function fleetCard(s) {
    const bits = [];
    const m = s.usage && s.usage.model; if (m) bits.push(`<span class="mono">${esc(shortModel(m))}</span>`);
    const p = ctxPct(s); if (p >= 0) bits.push(`${p}% ctx`);
    if (s.usage && s.usage.costUSD) bits.push(fmtUSD(s.usage.costUSD));
    if (s.transport === 'stream') bits.push(`<span class="tag">stream</span>`);
    return `<div class="card tap ${isBlocked(s) ? 'blocked' : ''}" data-id="${esc(s.sessionId)}">
      <div class="row">
        <div class="grow"><div class="name">${esc(agentName(s))}</div></div>
        ${stateChip(s)}
      </div>
      <div class="path">${esc(s.liveCwd || s.cwd || '')}</div>
      ${bits.length ? `<div class="meta">${bits.join('<span style="color:var(--disabled)">·</span>')}</div>` : ''}
    </div>`;
  }
  function shortModel(m) { return String(m).replace(/^claude-/, '').replace(/-20\d{6}$/, '').replace(/\[1m\]/, ' 1m'); }

  // ── needs you ──────────────────────────────────────────────────────────────
  function renderNeeds() {
    const list = liveList().filter(isBlocked);
    if (!list.length) { main.innerHTML = emptyHtml('◎', 'Nothing needs you', 'Approvals and questions show up here.'); return; }
    main.innerHTML = list.map(s =>
      `<div class="card blocked">
        <div class="row"><div class="grow"><div class="name">${esc(agentName(s))}</div>
          <div class="path">${esc(s.liveCwd || s.cwd || '')}</div></div>
          <button class="btn" style="flex:0 0 auto;min-width:0;padding:8px 12px" data-open="${esc(s.sessionId)}">Open</button></div>
        ${decisionHtml(s)}
      </div>`).join('');
    bindDecisions(main);
    for (const b of main.querySelectorAll('[data-open]')) b.onclick = () => openChat(b.dataset.open);
  }

  // ── decision (approval / questions) rendering + binding ─────────────────────
  function decisionHtml(s) {
    if (s.pendingApproval) {
      const a = s.pendingApproval;
      return `<div class="decision" data-id="${esc(s.sessionId)}" data-kind="approval">
        <div class="q">Approve <span class="tool">${esc(a.toolName)}</span>?</div>
        <div class="inp">${esc(summarizeInput(a.toolInput))}</div>
        <div class="btns">
          <button class="btn good" data-d="yes">Approve</button>
          <button class="btn" data-d="always">Always</button>
          <button class="btn danger" data-d="no">Deny</button>
        </div>
      </div>`;
    }
    if (s.pendingQuestions && s.pendingQuestions.length) {
      const groups = s.pendingQuestions.map((q, qi) => {
        const opts = (q.options || []).map((o, oi) =>
          `<button class="btn opt" data-q="${qi}" data-opt="${oi + 1}">${esc(o.label)}${o.description ? `<span class="odesc">${esc(o.description)}</span>` : ''}</button>`).join('');
        return `<div class="qgroup"><div class="q">${esc(q.question)}</div><div class="btns" style="flex-direction:column">${opts}</div></div>`;
      }).join('');
      const multi = s.pendingQuestions.length > 1;
      return `<div class="decision" data-id="${esc(s.sessionId)}" data-kind="question" data-n="${s.pendingQuestions.length}">
        ${groups}
        ${multi ? `<div class="btns"><button class="btn primary" data-submit>Submit answers</button></div>` : ''}
      </div>`;
    }
    return '';
  }
  function bindDecisions(root) {
    for (const d of root.querySelectorAll('.decision')) {
      const id = d.dataset.id;
      if (d.dataset.kind === 'approval') {
        for (const b of d.querySelectorAll('[data-d]')) b.onclick = () => approve(id, b.dataset.d);
      } else if (d.dataset.kind === 'question') {
        const n = Number(d.dataset.n || 1);
        for (const b of d.querySelectorAll('[data-opt]')) {
          b.onclick = () => {
            const qi = Number(b.dataset.q);
            picks.set(id + ':' + qi, Number(b.dataset.opt));
            for (const sib of d.querySelectorAll(`[data-q="${qi}"]`)) sib.classList.toggle('picked', sib === b);
            if (n === 1) submitAnswers(id, d);   // single question → answer immediately
          };
        }
        const sub = d.querySelector('[data-submit]');
        if (sub) sub.onclick = () => submitAnswers(id, d);
      }
    }
  }
  function summarizeInput(input) {
    if (input == null) return '';
    if (typeof input === 'string') return input;
    const o = input;
    if (o.command) return o.command;
    if (o.file_path) return o.file_path + (o.content ? '\n' + String(o.content).slice(0, 400) : '');
    if (o.path) return o.path;
    if (o.url) return o.url;
    if (o.pattern) return o.pattern;
    try { return JSON.stringify(o, null, 2).slice(0, 600); } catch { return String(o); }
  }

  // ── actions ────────────────────────────────────────────────────────────────
  function approve(id, decision) {
    call('claude.approve', { sessionId: id, decision })
      .then(() => toast(decision === 'no' ? 'Denied' : 'Approved'))
      .catch(e => toast('Failed: ' + (e.message || e)));
  }
  function submitAnswers(id, decisionEl) {
    const n = Number(decisionEl.dataset.n || 1);
    const answers = [];
    for (let qi = 0; qi < n; qi++) {
      const pick = picks.get(id + ':' + qi);
      if (!pick) { toast('Pick an option for every question'); return; }
      answers.push(String(pick));   // daemon maps 1-indexed picks → option labels
    }
    call('claude.answer', { sessionId: id, answers })
      .then(() => { toast('Answered'); for (let qi = 0; qi < n; qi++) picks.delete(id + ':' + qi); })
      .catch(e => toast('Failed: ' + (e.message || e)));
  }

  // ── chat ───────────────────────────────────────────────────────────────────
  function openChat(id) {
    const s = sessions.get(id); if (!s) return;
    view = { name: 'chat', sessionId: id };
    for (const b of nav.querySelectorAll('button')) b.classList.remove('active');
    hdr.classList.add('has-back'); main.style.display = 'none'; nav.style.display = 'none';
    chatEl.classList.add('show');
    renderChat(true);
    msgEl.focus();
  }
  function renderChat(scrollBottom) {
    const s = sessions.get(view.sessionId);
    if (!s) { setTab('fleet'); return; }
    titleEl.textContent = agentName(s);
    subEl.innerHTML = stateChip(s) + (s.transport === 'stream' ? ' <span class="tag">stream</span>' : '');

    const atBottom = scrollBottom || (transcript.scrollHeight - transcript.scrollTop - transcript.clientHeight < 60);
    const turns = s.conversation || [];
    if (!turns.length) {
      transcript.innerHTML = `<div class="empty"><div class="big">No messages yet</div><div class="small">Say something to get started.</div></div>`;
    } else {
      transcript.innerHTML = turns.map(turnHtml).join('');
    }
    chatDecision.innerHTML = isBlocked(s) ? decisionHtml(s) : '';
    if (chatDecision.firstChild) bindDecisions(chatDecision);
    if (atBottom) transcript.scrollTop = transcript.scrollHeight;
    sendBtn.disabled = !isLive(s);
  }
  function turnHtml(t) {
    let inner = renderBody(t.content || '');
    if (t.toolCalls && t.toolCalls.length) inner += t.toolCalls.map(toolChip).join('');
    if (!inner.trim()) return '';
    return `<div class="turn ${t.role === 'user' ? 'user' : 'assistant'}"><div class="bubble">${inner}</div></div>`;
  }
  function toolChip(tc) {
    return `<div class="toolchip"><span class="tn">${esc(tc.name)}</span>` +
      `<span class="ti">${esc(oneLine(summarizeInput(tc.input)))}</span>` +
      `<span class="sd ${esc(tc.status || 'complete')}"></span></div>`;
  }
  function oneLine(s) { return String(s || '').split('\n')[0].slice(0, 80); }
  // Minimal, safe markdown: escape everything, then lift ``` fenced blocks to
  // <pre> and `inline` to <code>. No HTML ever reaches the DOM unescaped.
  function renderBody(text) {
    const parts = String(text).split(/```/);
    return parts.map((seg, i) => {
      if (i % 2 === 1) { const body = seg.replace(/^[a-zA-Z0-9_-]*\n/, ''); return `<pre>${esc(body)}</pre>`; }
      return esc(seg).replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
    }).join('');
  }

  function sendMessage() {
    if (view.name !== 'chat') return;
    const text = (msgEl.value || '').trim(); if (!text) return;
    sendBtn.disabled = true;
    call('agents.sendMessage', { sessionId: view.sessionId, text })
      .then(() => { msgEl.value = ''; autosize(); toast('Sent'); })
      .catch(e => toast('Send failed: ' + (e.message || e)))
      .finally(() => { sendBtn.disabled = false; });
  }
  function autosize() { msgEl.style.height = 'auto'; msgEl.style.height = Math.min(msgEl.scrollHeight, 120) + 'px'; }

  // ── spawn ──────────────────────────────────────────────────────────────────
  const PROVIDERS = [['claude', 'Claude'], ['codex', 'Codex'], ['opencode', 'OpenCode'], ['pi', 'Pi']];
  let spawnState = { cwd: '', provider: 'claude', model: '' };
  function renderSpawn() {
    const dirs = cfg && cfg.directories || {};
    const favs = dirs.favourites || [], recent = (dirs.recent || []).filter(d => !(favs.includes(d)));
    const quick = [...favs, ...recent].slice(0, 8);
    if (!spawnState.provider) spawnState.provider = (cfg && cfg.agents && cfg.agents.defaultProvider) || 'claude';
    main.innerHTML = `<div class="glow"></div><div class="form">
      <div class="field">
        <div class="label">Working directory</div>
        <input id="spCwd" type="text" placeholder="/path/to/project" value="${esc(spawnState.cwd)}" />
        ${quick.length ? `<div class="chips">${quick.map(d => `<button class="chipbtn" data-dir="${esc(d)}">${esc(basename(d))}</button>`).join('')}</div>` : ''}
      </div>
      <div class="field">
        <div class="label">Harness</div>
        <div class="seg">${PROVIDERS.map(([v, l]) => `<button data-prov="${v}" class="${spawnState.provider === v ? 'on' : ''}">${l}</button>`).join('')}</div>
      </div>
      <div class="field">
        <div class="label">Model <span style="text-transform:none;color:var(--faint);font-weight:400">(optional)</span></div>
        <input id="spModel" type="text" placeholder="blank = default" value="${esc(spawnState.model)}" />
      </div>
      <button class="spawnBtn" id="spGo">Spawn agent</button>
      <div class="note">◆ Runs in stream mode (chat, no terminal).</div>
    </div>`;
    $('spCwd').oninput = e => spawnState.cwd = e.target.value;
    $('spModel').oninput = e => spawnState.model = e.target.value;
    for (const b of main.querySelectorAll('[data-dir]')) b.onclick = () => { spawnState.cwd = b.dataset.dir; $('spCwd').value = b.dataset.dir; };
    for (const b of main.querySelectorAll('[data-prov]')) b.onclick = () => { spawnState.provider = b.dataset.prov; renderSpawn(); };
    $('spGo').onclick = doSpawn;
  }
  function doSpawn() {
    const cwd = (spawnState.cwd || '').trim();
    if (!cwd) { toast('Enter a working directory'); return; }
    const btn = $('spGo'); btn.disabled = true; btn.textContent = 'Spawning…';
    const opts = { cwd, provider: spawnState.provider, transport: 'stream' };
    if ((spawnState.model || '').trim()) opts.model = spawnState.model.trim();
    call('agents.spawn', opts)
      .then(r => {
        const id = r && r.sessionId;
        toast('Spawned');
        spawnState = { cwd: '', provider: spawnState.provider, model: '' };
        if (id) { setTimeout(() => { seed().then(() => { if (sessions.get(id)) openChat(id); else setTab('fleet'); }); }, 400); }
        else setTab('fleet');
      })
      .catch(e => { toast('Spawn failed: ' + (e.message || e)); btn.disabled = false; btn.textContent = 'Spawn agent'; });
  }

  // ── misc render helpers ─────────────────────────────────────────────────────
  function emptyHtml(ic, big, small) {
    return `<div class="empty"><div class="ic">${ic}</div><div class="big">${esc(big)}</div><div class="small">${esc(small)}</div></div>`;
  }

  // ── connection ──────────────────────────────────────────────────────────────
  function setConnected(on) { dot.classList.toggle('on', on); }
  function gate() {
    nav.style.display = 'none'; chatEl.classList.remove('show'); main.style.display = 'block';
    hdr.classList.remove('has-back'); titleEl.textContent = 'Workspacer'; subEl.textContent = '';
    main.innerHTML = `<div class="glow"></div><div class="gate"><h2>Connect</h2>
      <p>Paste your workspacer remote token.</p>
      <input id="tok" placeholder="token" autocomplete="off" />
      <button id="tokGo">Connect</button></div>`;
    $('tokGo').onclick = () => { const v = ($('tok').value || '').trim(); if (!v) return; token = v; sessionStorage.setItem('hubToken', v); connect(); };
    $('tok').addEventListener('keydown', e => { if (e.key === 'Enter') $('tokGo').click(); });
  }
  // Detach + close a socket without letting its late close/error callbacks run
  // (they'd race a newer connection). Safe to call on any socket.
  function killSocket(sock) {
    if (!sock) return;
    try { sock.onopen = sock.onmessage = sock.onerror = sock.onclose = null; sock.close(); } catch {}
  }
  function connect() {
    if (!token) return gate();
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    clearTimeout(watchdog);
    setConnected(false);
    let sock;
    try { sock = new WebSocket(wsURL()); } catch { return scheduleReconnect(); }
    ws = sock;
    // Phones routinely hand us a WebSocket whose handshake hangs — the host or
    // the Tailscale link was asleep, so it neither opens nor errors and the OS
    // won't give up for 30–75s. Without this we'd sit "connecting" that whole
    // time. If onopen hasn't fired quickly, abandon it and retry.
    watchdog = setTimeout(() => {
      if (sock.readyState !== WebSocket.OPEN) { killSocket(sock); if (ws === sock) ws = null; scheduleReconnect(); }
    }, 4500);
    sock.onopen = () => {
      clearTimeout(watchdog);
      backoff = 500; lastActivity = Date.now(); setConnected(true);
      sock.send(JSON.stringify({ op: 'subscribe', topics: ['agent.snapshot'] }));
      if (!cfg) call('config.get', {}).then(c => { cfg = c; }).catch(() => {});
      seed();
      // Reconcile every 25s so the fleet self-heals if an event was missed while
      // the socket blipped. Doubles as a heartbeat that keeps lastActivity fresh
      // (< STALE_MS) so wake() won't needlessly tear down a healthy idle socket.
      clearInterval(reconcileTimer);
      reconcileTimer = setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) seed(); }, 25000);
    };
    sock.onmessage = (ev) => {
      lastActivity = Date.now();
      let f; try { f = JSON.parse(ev.data); } catch { return; }
      if (f.op === 'result') { const c = calls.get(f.id); if (c) { calls.delete(f.id); c.resolve(f.result); } }
      else if (f.op === 'error' && f.id) { const c = calls.get(f.id); if (c) { calls.delete(f.id); c.reject(new Error(f.error || 'error')); } }
      else if (f.op === 'event' && f.event) {
        const t = f.event.type || '';
        // agent.snapshot carries the full snapshot — apply it incrementally.
        // A periodic seed() (below) reconciles anything missed (e.g. a session
        // that vanished without a final ended snapshot).
        if (t === 'agent.snapshot' && f.event.data && f.event.data.sessionId) upsert(f.event.data);
      }
    };
    sock.onclose = (ev) => {
      clearTimeout(watchdog);
      if (ws === sock) ws = null;
      setConnected(false);
      if (ev.code === 1008 || ev.code === 4401) { token = ''; sessionStorage.removeItem('hubToken'); return gate(); }
      scheduleReconnect();
    };
    sock.onerror = () => { try { sock.close(); } catch {} };
  }
  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, backoff);
    backoff = Math.min(backoff * 2, 5000);
  }
  // Mobile browsers suspend a backgrounded tab's socket (often without ever
  // firing close), so on return we'd sit on a dead socket. Reconnect on every
  // signal that we're foreground again — visibility, bfcache restore (pageshow),
  // window focus, and network-online — unless the socket is provably still live.
  function wake() {
    if (!token || document.visibilityState === 'hidden') return;
    const live = ws && ws.readyState === WebSocket.OPEN && Date.now() - lastActivity < STALE_MS;
    if (live) return;
    backoff = 500;
    clearTimeout(watchdog);
    killSocket(ws); ws = null; connect();
  }
  document.addEventListener('visibilitychange', wake);
  window.addEventListener('online', wake);
  window.addEventListener('focus', wake);
  window.addEventListener('pageshow', wake);   // iOS Safari bfcache restore

  // ── wiring ──────────────────────────────────────────────────────────────────
  for (const b of nav.querySelectorAll('button')) b.onclick = () => setTab(b.dataset.tab);
  backBtn.onclick = () => setTab('fleet');
  sendBtn.onclick = sendMessage;
  msgEl.addEventListener('input', autosize);
  msgEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  // iOS software keyboard: expose its height as --kb so the composer floats above it.
  if (window.visualViewport) {
    const vv = window.visualViewport;
    const applyKb = () => {
      const kb = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty('--kb', (kb > 80 ? kb : 0) + 'px');
      if (view.name === 'chat') transcript.scrollTop = transcript.scrollHeight;
    };
    vv.addEventListener('resize', applyKb); vv.addEventListener('scroll', applyKb); applyKb();
  }

  connect();
})();
</script>
</body>
</html>
