name: ci

# Test + typecheck/lint on every PR and every push to master. Complements
# release.yml (which only smoke-BUILDS the installers). Toolchain setup/versions
# here mirror release.yml exactly (Node 22, Go 1.25.4, Rust stable, the two
# `npm ci`s, and the same caches).
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

# A newer push to the same ref cancels the older in-progress run on PRs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------------
  # Desktop: TypeScript typecheck (main + renderer) and the vitest suites.
  # apps/desktop and apps/desktop/src/renderer each have their own
  # package-lock.json, so both need their own `npm ci` (same as release.yml).
  # ---------------------------------------------------------------------------
  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            apps/desktop/package-lock.json
            apps/desktop/src/renderer/package-lock.json

      # apps/desktop's postinstall runs electron-rebuild (better-sqlite3 against
      # Electron's ABI). It needs Electron's prebuilt binaries; on a headless
      # Linux runner that's fine for the rebuild step.
      - name: Install desktop deps
        run: npm ci

      - name: Install renderer deps
        working-directory: apps/desktop/src/renderer
        run: npm ci

      # Prettier gate. `.prettierrc` pins the codebase style (singleQuote, semi,
      # printWidth 100); --check fails if any tracked TS/TSX is unformatted.
      - name: Format check
        run: npm run format:check

      # `npm run typecheck` => typecheck:main (tsc -p tsconfig.main.json
      # --noEmit; the main config emits by default, so --noEmit forces a pure
      # typecheck) + typecheck:renderer (tsc in src/renderer, whose tsconfig
      # already has noEmit:true).
      - name: Typecheck
        run: npm run typecheck

      # `npm test` => test:main (vitest run) + test:renderer (vitest run in
      # src/renderer). Both already use `run`, so vitest does not watch.
      - name: Test
        env:
          CI: 'true'
        run: npm test

  # ---------------------------------------------------------------------------
  # claudemon (Rust): cargo test + clippy. Same Swatinem cache as release.yml.
  # ---------------------------------------------------------------------------
  claudemon:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/claudemon
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build (claudemon)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/claudemon

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test

      # The tree is clippy-clean, so warnings are hard errors.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # tui (Rust): cargo fmt --check + test + clippy.
  # ---------------------------------------------------------------------------
  tui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build (tui)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tui

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test

      # The tree is clippy-clean, so warnings are hard errors.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # hub (Go): go vet + go test. Go version pinned to match release.yml.
  # ---------------------------------------------------------------------------
  hub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/hub
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
          cache-dependency-path: services/hub/go.sum

      # gofmt is not enforced by `go build`, so guard it explicitly: fail if any
      # file would be reformatted (gofmt -l prints such files; non-empty = fail).
      - name: Format check
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

      - name: Vet
        run: go vet ./...

      # -race matches the Makefile's `make test-hub` target.
      - name: Test
        run: go test -race ./...
