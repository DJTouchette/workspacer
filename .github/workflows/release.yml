name: release

# Build the desktop app + bundled daemons (claudemon/Rust, hub/mcp/brain/Go) on
# all three desktop OSes. On a version tag (v*) the installers are attached to a
# GitHub Release — along with a standalone headless-server bundle
# (workspacer-server-<os>-<arch>) per platform; on PRs / manual runs it's a
# build smoke-test that just uploads the artifacts so you can catch
# per-platform breakage early.
on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      nightly:
        description: 'Publish to the rolling nightly prerelease'
        type: boolean
        default: false
  # Rolling nightly: rebuild master and republish the `nightly` prerelease
  # (skipped by the gate job when nothing changed since the last one).
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC, overnight for NA

# A newer push to the same ref cancels the older in-progress run (saves minutes
# on PRs). Tag builds use the tag as the group, so they never cancel each other.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Decides whether this run is a nightly (schedule, or dispatch with the
  # nightly input) and whether to build at all — a scheduled run with no new
  # commits since the last nightly is skipped, saving ~3 runner-hours/night.
  # Also stamps the nightly version ONCE so all three legs agree (legs stamping
  # their own dates could straddle midnight UTC) and the stamp stays semver-
  # monotonic across same-day rebuilds (a trailing sha compares lexically and
  # can go backwards; a datetime cannot). The stamp is ONE joined numeric
  # identifier — a dotted .HHMM piece would have leading zeros at the 08:00
  # cron, which strict semver forbids and npm silently rewrites (.0800 → .800),
  # leaving the stamp disagreeing with the shipped version. The old release is
  # NOT deleted here — publish-nightly rolls it after every leg has built, so
  # a failed build leaves yesterday's nightly in place instead of nothing.
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      nightly: ${{ steps.decide.outputs.nightly }}
      build: ${{ steps.decide.outputs.build }}
      stamp: ${{ steps.decide.outputs.stamp }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          nightly=false
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.nightly }}" = "true" ]; then
            nightly=true
          fi
          build=true
          if [ "$nightly" = "true" ]; then
            last=$(gh api "repos/${{ github.repository }}/git/ref/tags/nightly" -q .object.sha 2>/dev/null || echo none)
            if [ "$last" = "${{ github.sha }}" ]; then
              echo "nightly already built for ${{ github.sha }} — skipping"
              build=false
            fi
          fi
          echo "nightly=$nightly" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "stamp=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

  build:
    needs: gate
    if: needs.gate.outputs.build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # `server` names the standalone headless-server bundle for the leg
          # (workspacer-server-<server>.tar.gz, .zip on Windows).
          # Windows → NSIS installer + portable .exe (x64).
          - os: windows-latest
            artifact: windows
            server: windows-x64
          # macOS → .dmg, Apple Silicon only. There is no Intel leg: GitHub is
          # retiring the macos-13 (last Intel) runner pool and its queue never
          # drained for v0.124.0 — and the daemons build natively per arch, so
          # an Intel dmg needs an Intel runner, not a cross-compile flag.
          # Revisit only if Intel-Mac demand actually shows up.
          - os: macos-14
            artifact: macos-arm64
            server: darwin-arm64
          # Linux → AppImage. AppImage is distro-agnostic (runs on Arch, Fedora,
          # Debian, …); GitHub only offers Ubuntu runners, and we pin the OLDEST
          # supported Ubuntu so the glibc the AppImage links against stays broadly
          # compatible (glibc is backward- but not forward-compatible, and
          # AppImage doesn't bundle it).
          - os: ubuntu-22.04
            artifact: linux
            server: linux-x64
    runs-on: ${{ matrix.os }}
    # Enter the `release` environment only for Windows tag-builds (that's the
    # subject our Azure OIDC federated credential trusts). Empty otherwise, so
    # PR/other-OS legs aren't gated by it.
    environment: ${{ (matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')) && 'release' || '' }}
    defaults:
      run:
        working-directory: apps/desktop
    env:
      # macOS signing isn't wired yet (needs an Apple cert + notarization), so
      # stop electron-builder hunting for one (which would fail the macOS build).
      # Windows IS signed below via Azure Trusted Signing on tag builds.
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            apps/desktop/package-lock.json
            apps/desktop/src/renderer/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
          cache-dependency-path: services/hub/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build (claudemon)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/claudemon

      # apps/desktop's postinstall rebuilds better-sqlite3 against Electron's
      # ABI for this OS, so the native module ships correctly per platform.
      - name: Install desktop deps
        run: npm ci

      - name: Install renderer deps
        working-directory: apps/desktop/src/renderer
        run: npm ci

      # Nightlies get a distinguishable semver prerelease version so installers
      # don't collide with the last stable and the app can show a NIGHTLY badge
      # (app.getVersion() picks this up at package time). The date.time stamp
      # comes from the gate job so all legs agree; the source sha lives in the
      # release notes, not the version.
      - name: Stamp nightly version
        if: needs.gate.outputs.nightly == 'true'
        shell: bash
        run: |
          base=$(node -p "require('./package.json').version")
          v="$base-nightly.${{ needs.gate.outputs.stamp }}"
          npm version --no-git-tag-version "$v"
          echo "nightly version: $v"

      # Windows release builds sign via Azure Trusted Signing (OIDC — no stored
      # secret). Only when this is a tag build AND the cert-profile var is set,
      # so PRs and the pre-signing-setup period stay unsigned (and don't fail).
      # Nightlies are excluded even when dispatched from a v* tag ref — they
      # must take the unsigned path so the dashed artifactName override applies
      # (and the release notes' "Unsigned." stays true).
      - name: Azure login (Windows signing)
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v') && vars.AZURE_CODESIGN_PROFILE != '' && needs.gate.outputs.nightly != 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Mirrors `npm run package`: builds the renderer + main, compiles the Go
      # and Rust daemons, then runs electron-builder for THIS host OS. `--publish
      # never` keeps electron-builder from uploading (we attach to the Release
      # ourselves, below).
      - name: Package (Windows, signed via Azure Trusted Signing)
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v') && vars.AZURE_CODESIGN_PROFILE != '' && needs.gate.outputs.nightly != 'true'
        shell: pwsh
        run: >
          npm run package -- --publish never
          -c.win.azureSignOptions.endpoint=https://eus.codesigning.azure.net/
          -c.win.azureSignOptions.codeSigningAccountName=WorkSpacer
          -c.win.azureSignOptions.certificateProfileName=${{ vars.AZURE_CODESIGN_PROFILE }}
          "-c.win.azureSignOptions.publisherName=${{ vars.AZURE_CODESIGN_PUBLISHER }}"

      - name: Package (unsigned)
        if: ${{ !(matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v') && vars.AZURE_CODESIGN_PROFILE != '' && needs.gate.outputs.nightly != 'true') }}
        shell: bash
        run: |
          extra=()
          if [ "${{ needs.gate.outputs.nightly }}" = "true" ]; then
            # Nightlies need SPACE-FREE Windows artifact names: GitHub rewrites
            # spaces in asset names to dots, but the generic update feed requests
            # the literal (dash-sanitized) fileName from latest.yml — the default
            # "Workspacer Setup <v>.exe" naming would 404 the nightly updater.
            # Stable keeps the default names (the landing page links them, and
            # the GitHub provider handles the dot-rename itself).
            extra+=('-c.nsis.artifactName=${productName}-Setup-${version}.${ext}')
            extra+=('-c.portable.artifactName=${productName}-${version}.${ext}')
          fi
          npm run package -- --publish never "${extra[@]}"

      # Standalone headless-server bundle: the four binaries `workspacer serve`
      # supervises — workspacer + hub + brain + claudemon — in ONE directory
      # (the CLI resolves its daemons sibling-first, so extract-and-run needs no
      # flags) plus a short README. Reuses the binaries the package step just
      # built; tar.gz per Unix convention, zip on Windows. Dropped into
      # apps/desktop/release/ so the existing upload/attach steps pick it up.
      - name: Bundle standalone server
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          ext=""
          tmp="$RUNNER_TEMP"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ext=".exe"
            tmp=$(cygpath -u "$tmp") # git-bash coreutils choke on C:\-style paths
          fi
          dir="$tmp/workspacer-server"
          rm -rf "$dir"
          mkdir -p "$dir"
          cp "services/hub/workspacer$ext" "services/hub/hub$ext" \
             "services/hub/brain$ext" \
             "services/claudemon/target/release/claudemon$ext" "$dir/"
          # The built web app: `workspacer serve` auto-serves a sibling web/
          # at /app (the full renderer), no flag needed.
          cp -r "apps/desktop/dist/web" "$dir/web"
          cat > "$dir/README.md" <<'EOF'
          # workspacer headless server

          Run workspacer's agent fleet on a machine with no desktop app:

          1. Extract this directory anywhere (keep the binaries together —
             `workspacer` finds its daemons next to itself).
          2. `./workspacer serve`

          That starts and supervises claudemon (sessions) + the hub (bus, with a
          full-scope brain), and prints the client URLs + pairing token — for the
          phone client (/m), the browser client (/remote), the full web app
          (/app, served from the bundled web/ directory), wks-tui, and MCP.

          Also:

              ./workspacer status                 what's running
              ./workspacer install-cli            put `workspacer` on your PATH
              ./workspacer serve --host 0.0.0.0   remote access opt-in (pair with Tailscale)

          Docs: https://github.com/DJTouchette/workspacer
          EOF
          out="$PWD/apps/desktop/release"
          mkdir -p "$out"
          name="workspacer-server-${{ matrix.server }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            (cd "$tmp" && 7z a "$out/$name.zip" workspacer-server)
          else
            tar -C "$tmp" -czf "$out/$name.tar.gz" workspacer-server
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workspacer-${{ matrix.artifact }}
          # Installers PLUS the electron-updater metadata (latest*.yml) and the
          # delta .blockmap files — the updater needs the .yml + .blockmap next
          # to each installer, not just the installer — plus the standalone
          # headless-server bundle.
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
            apps/desktop/release/workspacer-server-*
          if-no-files-found: error

      # Only on a version tag: attach this OS's installers to the GitHub Release
      # for the tag (each matrix leg appends its own files to the same release).
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Attach the update metadata (latest*.yml) + .blockmap alongside the
          # installers so electron-updater can read the release as an update
          # feed, and the standalone headless-server bundle.
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
            apps/desktop/release/latest*.yml
            apps/desktop/release/*.blockmap
            apps/desktop/release/workspacer-server-*
          draft: true
          fail_on_unmatched_files: false

    permissions:
      contents: write
      id-token: write # Azure OIDC federated login for Windows Trusted Signing

  # Rolls the `nightly` prerelease ATOMICALLY, and only after ALL THREE legs
  # built (a failed leg skips this job and yesterday's nightly stays live).
  # Every updater-critical asset is verified present BEFORE the old release is
  # touched, so a leg that "succeeded" but produced no installer can't ship a
  # release the updater can't read. The latest*.yml/.blockmap metadata IS
  # attached — nightly installs read this feed via the generic provider
  # (updateService switches on the -nightly version); stable installs never
  # see it (their GitHub provider resolves /releases/latest, which excludes
  # prereleases — and the `nightly` tag sits outside the v* pattern the
  # landing page watches).
  publish-nightly:
    needs: [gate, build]
    if: needs.gate.outputs.nightly == 'true'
    runs-on: ubuntu-latest
    # One lock across ALL refs: a dispatch-nightly from another branch would
    # otherwise land in a different release-${ref} group and interleave its
    # delete/create with the cron's on the single shared `nightly` tag.
    concurrency:
      group: publish-nightly
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: workspacer-*
          merge-multiple: true
          path: dist

      - name: Verify assets and roll the nightly release
        working-directory: dist
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Updater-critical assets, per platform — every glob the create below
          # uses must match BEFORE we touch the live release. (No mac zip yet:
          # MacUpdater needs one, but mac auto-update is dead until signing
          # lands anyway — add '*-mac.zip' here when the zip target ships.)
          for pat in 'Workspacer-Setup-*.exe' '*.AppImage' '*-arm64.dmg' \
                     'latest.yml' 'latest-linux.yml' 'latest-mac.yml' \
                     '*.blockmap' \
                     'workspacer-server-windows-x64.zip' \
                     'workspacer-server-linux-x64.tar.gz' \
                     'workspacer-server-darwin-arm64.tar.gz'; do
            compgen -G "$pat" > /dev/null || { echo "missing expected asset: $pat"; exit 1; }
          done

          # Roll the release PUBLISH-LAST so a failure at any point leaves
          # yesterday's nightly live instead of nothing:
          #   1. drop stray drafts from earlier failed rolls
          #   2. upload today's build as a DRAFT (drafts create no tag, so it
          #      coexists with the live release)
          #   3. retire the old live release + tag — by id, since gh's
          #      name-based lookup could resolve to our fresh draft
          #   4. publish the draft (GitHub creates the tag at --target now)

          for id in $(gh api "repos/$REPO/releases" --paginate \
                        -q '.[] | select(.draft and .tag_name=="nightly") | .id'); do
            gh api -X DELETE "repos/$REPO/releases/$id"
          done

          notes="Rolling nightly build of master (${{ github.sha }}). Unsigned.

          Nightly installs auto-update onto the next nightly from this feed and never onto stable — to return to stable, install a release build from the releases page."
          shopt -s nullglob
          assets=( *.exe *.AppImage *.dmg latest*.yml *.blockmap workspacer-server-* )
          shopt -u nullglob
          gh release create nightly \
            --repo "$REPO" \
            --title Nightly \
            --prerelease \
            --draft \
            --target "${{ github.sha }}" \
            --notes "$notes" \
            "${assets[@]}"
          draft_id=$(gh api "repos/$REPO/releases" --paginate \
                       -q '[.[] | select(.draft and .tag_name=="nightly")][0].id')

          live_id=$(gh api "repos/$REPO/releases" --paginate \
                      -q '[.[] | select((.draft | not) and .tag_name=="nightly")][0].id')
          if [ -n "$live_id" ] && [ "$live_id" != "null" ]; then
            gh api -X DELETE "repos/$REPO/releases/$live_id"
          fi
          # The tag can outlive the release (UI deletion, partial cleanup);
          # publishing over a stale tag would pin the release to the wrong
          # commit, so assert it's really gone. Ref deletion is eventually
          # consistent, though — an immediate re-read can still see the ref we
          # just deleted. A single-shot check therefore false-aborts on a
          # propagation lag, and by this point the old release is ALREADY
          # retired, so aborting leaves NO live nightly. Poll instead: re-issue
          # the delete (harmless once gone) and wait for the ref to actually
          # disappear before giving up.
          gone=false
          for attempt in 1 2 3 4 5 6; do
            gh api -X DELETE "repos/$REPO/git/refs/tags/nightly" 2>/dev/null || true
            if ! gh api "repos/$REPO/git/ref/tags/nightly" >/dev/null 2>&1; then
              gone=true
              break
            fi
            echo "nightly tag still present (attempt $attempt/6) — waiting for deletion to propagate…"
            sleep 5
          done
          if [ "$gone" != "true" ]; then
            echo "nightly tag still exists after retries — aborting before publishing a mistargeted release"
            exit 1
          fi

          gh api -X PATCH "repos/$REPO/releases/$draft_id" -F draft=false
