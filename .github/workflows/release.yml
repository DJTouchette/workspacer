name: release

# Build the desktop app + bundled daemons (claudemon/Rust, hub/mcp/brain/Go) on
# all three desktop OSes. On a version tag (v*) the installers are attached to a
# GitHub Release; on PRs / manual runs it's a build smoke-test that just uploads
# the artifacts so you can catch per-platform breakage early.
on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# A newer push to the same ref cancels the older in-progress run (saves minutes
# on PRs). Tag builds use the tag as the group, so they never cancel each other.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows → NSIS installer + portable .exe (x64).
          - os: windows-latest
            artifact: windows
          # macOS → .dmg, both architectures. macos-14 is Apple-silicon (arm64);
          # macos-13 is Intel (x64). Each leg builds the daemons natively for its
          # arch and attaches its own .dmg to the release.
          - os: macos-14
            artifact: macos-arm64
          - os: macos-13
            artifact: macos-x64
          # Linux → AppImage. AppImage is distro-agnostic (runs on Arch, Fedora,
          # Debian, …); GitHub only offers Ubuntu runners, and we pin the OLDEST
          # supported Ubuntu so the glibc the AppImage links against stays broadly
          # compatible (glibc is backward- but not forward-compatible, and
          # AppImage doesn't bundle it).
          - os: ubuntu-22.04
            artifact: linux
    runs-on: ${{ matrix.os }}
    # Enter the `release` environment only for Windows tag-builds (that's the
    # subject our Azure OIDC federated credential trusts). Empty otherwise, so
    # PR/other-OS legs aren't gated by it.
    environment: ${{ (matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')) && 'release' || '' }}
    defaults:
      run:
        working-directory: apps/desktop
    env:
      # macOS signing isn't wired yet (needs an Apple cert + notarization), so
      # stop electron-builder hunting for one (which would fail the macOS build).
      # Windows IS signed below via Azure Trusted Signing on tag builds.
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            apps/desktop/package-lock.json
            apps/desktop/src/renderer/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
          cache-dependency-path: services/hub/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build (claudemon)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/claudemon

      # apps/desktop's postinstall rebuilds better-sqlite3 against Electron's
      # ABI for this OS, so the native module ships correctly per platform.
      - name: Install desktop deps
        run: npm ci

      - name: Install renderer deps
        working-directory: apps/desktop/src/renderer
        run: npm ci

      # Windows release builds sign via Azure Trusted Signing (OIDC — no stored
      # secret). Only when this is a tag build AND the cert-profile var is set,
      # so PRs and the pre-signing-setup period stay unsigned (and don't fail).
      - name: Azure login (Windows signing)
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v') && vars.AZURE_CODESIGN_PROFILE != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Mirrors `npm run package`: builds the renderer + main, compiles the Go
      # and Rust daemons, then runs electron-builder for THIS host OS. `--publish
      # never` keeps electron-builder from uploading (we attach to the Release
      # ourselves, below).
      - name: Package (Windows, signed via Azure Trusted Signing)
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v') && vars.AZURE_CODESIGN_PROFILE != ''
        shell: pwsh
        run: >
          npm run package -- --publish never
          -c.win.azureSignOptions.endpoint=https://eus.codesigning.azure.net/
          -c.win.azureSignOptions.codeSigningAccountName=WorkSpacer
          -c.win.azureSignOptions.certificateProfileName=${{ vars.AZURE_CODESIGN_PROFILE }}
          "-c.win.azureSignOptions.publisherName=${{ vars.AZURE_CODESIGN_PUBLISHER }}"

      - name: Package (unsigned)
        if: ${{ !(matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v') && vars.AZURE_CODESIGN_PROFILE != '') }}
        run: npm run package -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workspacer-${{ matrix.artifact }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
          if-no-files-found: error

      # Only on a version tag: attach this OS's installers to the GitHub Release
      # for the tag (each matrix leg appends its own files to the same release).
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
          draft: true
          fail_on_unmatched_files: false

    permissions:
      contents: write
      id-token: write # Azure OIDC federated login for Windows Trusted Signing
