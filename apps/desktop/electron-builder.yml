appId: com.workspacer.app
productName: Workspacer
asar: true

# electron-updater reads the latest PUBLISHED GitHub Release for this repo. This
# provider block is what makes electron-builder generate the update metadata
# (latest.yml / latest-linux.yml / latest-mac.yml + .blockmap files) alongside
# the installers. CI builds with `--publish never`, so nothing is uploaded from
# the build itself — the release workflow attaches the installers AND the
# metadata files to the drafted GitHub Release, which is the feed clients read.
publish:
  provider: github
  owner: DJTouchette
  repo: workspacer

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - node_modules/**/*
  - package.json
  - "!node_modules/**/*.{md,map,ts}"
  - "!node_modules/**/{test,tests,__tests__,docs,.github}/**"
  - "!**/*.d.ts"

asarUnpack:
  - node_modules/better-sqlite3/**
  # ripgrep binary must live outside the asar so it can be executed.
  - node_modules/@vscode/ripgrep/**
  - node_modules/@vscode/ripgrep-*/**

electronLanguages:
  - en-US

# Sibling daemons live at <repo>/services/* — built by `npm run build:hub`
# and `npm run build:claudemon` (both run by `npm run package`).
linux:
  icon: build/icon.png
  target:
    - AppImage
  category: Development
  extraResources:
    - from: ../../services/claudemon/target/release/claudemon
      to: claudemon/claudemon
    - from: ../../services/hub/hub
      to: hub/hub
    - from: ../../services/hub/mcp
      to: hub/mcp
    - from: ../../services/hub/brain
      to: hub/brain
    - from: ../../services/hub/examples
      to: hub/examples
    - from: dist/web
      to: web

win:
  icon: build/icon.ico
  target:
    - nsis
    - portable
  extraResources:
    - from: ../../services/claudemon/target/release/claudemon.exe
      to: claudemon/claudemon.exe
    - from: ../../services/hub/hub.exe
      to: hub/hub.exe
    - from: ../../services/hub/mcp.exe
      to: hub/mcp.exe
    - from: ../../services/hub/brain.exe
      to: hub/brain.exe
    - from: ../../services/hub/examples
      to: hub/examples
    - from: dist/web
      to: web

mac:
  icon: build/icon.png
  target:
    - dmg
  category: public.app-category.developer-tools
  extraResources:
    - from: ../../services/claudemon/target/release/claudemon
      to: claudemon/claudemon
    - from: ../../services/hub/hub
      to: hub/hub
    - from: ../../services/hub/mcp
      to: hub/mcp
    - from: ../../services/hub/brain
      to: hub/brain
    - from: ../../services/hub/examples
      to: hub/examples
    - from: dist/web
      to: web

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
