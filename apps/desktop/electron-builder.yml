appId: com.workspacer.app
productName: Workspacer
asar: true

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - node_modules/**/*
  - package.json
  - "!node_modules/**/*.{md,map,ts}"
  - "!node_modules/**/{test,tests,__tests__,docs,.github}/**"
  - "!**/*.d.ts"

asarUnpack:
  - node_modules/better-sqlite3/**
  # ripgrep binary must live outside the asar so it can be executed.
  - node_modules/@vscode/ripgrep/**
  - node_modules/@vscode/ripgrep-*/**

electronLanguages:
  - en-US

# Sibling daemons live at <repo>/services/* — built by `npm run build:hub`
# and `npm run build:claudemon` (both run by `npm run package`).
linux:
  target:
    - AppImage
  category: Development
  extraResources:
    - from: ../../services/claudemon/target/release/claudemon
      to: claudemon/claudemon
    - from: ../../services/hub/hub
      to: hub/hub
    - from: ../../services/hub/examples
      to: hub/examples
    - from: dist/web
      to: web

win:
  target:
    - nsis
    - portable
  extraResources:
    - from: ../../services/claudemon/target/release/claudemon.exe
      to: claudemon/claudemon.exe
    - from: ../../services/hub/hub.exe
      to: hub/hub.exe
    - from: ../../services/hub/examples
      to: hub/examples
    - from: dist/web
      to: web

mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  extraResources:
    - from: ../../services/claudemon/target/release/claudemon
      to: claudemon/claudemon
    - from: ../../services/hub/hub
      to: hub/hub
    - from: ../../services/hub/examples
      to: hub/examples
    - from: dist/web
      to: web

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
