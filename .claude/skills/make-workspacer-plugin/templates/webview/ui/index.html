<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>My Webview</title>
  <style>
    /* Theme via the host's --wks-* CSS vars, with dark fallbacks so the page
       also renders standalone in a browser. */
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, sans-serif; font-size: 12px;
      background: var(--wks-bg-base, #161616);
      color: var(--wks-text-primary, #e8e8e8);
    }
    header {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      border-bottom: 1px solid var(--wks-border-subtle, #2a2a2a);
    }
    header h1 { font-size: 0.85rem; margin: 0; font-weight: 600; }
    #conn { margin-left: auto; font-size: 0.6rem; color: var(--wks-text-muted, #888);
            display: flex; align-items: center; gap: 5px; }
    #conn .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--wks-text-faint, #666); }
    #conn.on .dot { background: var(--wks-success, #3fb950); box-shadow: 0 0 5px var(--wks-success, #3fb950); }
    .body { padding: 12px; }
    .row { display: flex; gap: 8px; align-items: baseline; padding: 3px 0; font-size: 0.72rem; }
    .row .k { color: var(--wks-text-muted, #888); }
    .empty { color: var(--wks-text-faint, #777); }
    body.compact .body { padding: 6px 10px; }
  </style>
</head>
<body>
  <header>
    <h1>🪟 My Webview</h1>
    <div id="conn"><span class="dot"></span><span id="ct">connecting…</span></div>
  </header>
  <div class="body">
    <div id="agents"><div class="empty">No agents yet.</div></div>
  </div>

  <script>
    // ── Bus wiring ─────────────────────────────────────────────────────────────
    // The host injects this plugin's scoped token into the pane URL as ?busToken=.
    const BUS_TOKEN = new URLSearchParams(location.search).get('busToken') || '';
    // Build the WS URL from the page's own origin so remote access + non-default
    // ports work. Fall back to the local default only when not served over http.
    const BUS_BASE = location.protocol.startsWith('http')
      ? (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/bus'
      : 'ws://127.0.0.1:7895/bus';
    const BUS = BUS_BASE + (BUS_TOKEN ? '?token=' + encodeURIComponent(BUS_TOKEN) : '');
    const SOURCE = 'owner.my-webview';   // keep in sync with plugin.json "id"
    const TOPICS = ['agent.state_changed', 'agent.snapshot']; // keep in sync with "consumes"

    let ws, connected = false, callSeq = 0;
    const pending = new Map();
    const $ = (id) => document.getElementById(id);
    function log(m) { try { console.log('[my-webview] ' + m); } catch {} }

    // Call a hub capability (must be in plugin.json "capabilities").
    function call(method, params) {
      return new Promise((resolve, reject) => {
        if (!connected) return reject(new Error('not connected'));
        const id = 'c' + (++callSeq); pending.set(id, { resolve, reject });
        ws.send(JSON.stringify({ op: 'call', id, method, params: params || {} }));
        setTimeout(() => { if (pending.has(id)) { pending.delete(id); reject(new Error('timeout')); } }, 8000);
      });
    }
    // Publish an event (must be in "emits", else dropped silently).
    function publish(type, data) {
      if (connected) ws.send(JSON.stringify({ op: 'publish', event: { type, source: SOURCE, data: data || {} } }));
    }
    function setConn(on) { connected = on; $('conn').classList.toggle('on', on); $('ct').textContent = on ? 'connected' : 'disconnected'; }

    // ── Settings (live) ────────────────────────────────────────────────────────
    // Webviews get settings live: an initial window.__WKS_SETTINGS__ plus a bus
    // settings event on change — no reload.
    function applySettings(s) {
      if (!s || typeof s !== 'object') return;
      document.body.classList.toggle('compact', !!s.compact);
    }
    applySettings(window.__WKS_SETTINGS__);

    // ── State + render ─────────────────────────────────────────────────────────
    let agents = [];
    function render() {
      const box = $('agents');
      if (!agents.length) { box.innerHTML = '<div class="empty">No agents yet.</div>'; return; }
      box.innerHTML = agents.map((a) => {
        const name = (a.cwd || '').replace(/\/$/, '').split('/').pop() || (a.sessionId || '').slice(0, 8) || 'agent';
        return '<div class="row"><span class="k">' + esc(name) + '</span><span>' + esc(a.state || a.mode || '') + '</span></div>';
      }).join('');
    }
    function esc(s) { return String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

    let refreshTimer = null;
    function scheduleRefresh() {
      if (refreshTimer) return;
      refreshTimer = setTimeout(async () => {
        refreshTimer = null;
        try { const rows = await call('agents.list'); if (Array.isArray(rows)) { agents = rows; render(); } }
        catch (e) { log('agents.list failed: ' + (e && e.message)); }
      }, 250);
    }

    // ── Inbound events ─────────────────────────────────────────────────────────
    function onEvent(event) {
      // Only event types in "consumes" arrive here.
      if (event.type === 'wks-settings' || event.type === 'plugin.settings') {
        applySettings((event.data && (event.data.settings || event.data)) || {});
        return;
      }
      // Any agent event may change the roster → refresh.
      scheduleRefresh();
    }

    function connect() {
      ws = new WebSocket(BUS);
      ws.onopen = () => {
        setConn(true);
        if (TOPICS.length) ws.send(JSON.stringify({ op: 'subscribe', topics: TOPICS }));
        scheduleRefresh();
        log('connected; subscribed to ' + TOPICS.join(', '));
      };
      ws.onmessage = (e) => {
        let f; try { f = JSON.parse(e.data); } catch { return; }
        if (f.op === 'event' && f.event) onEvent(f.event);
        else if (f.op === 'result' && pending.has(f.id)) { pending.get(f.id).resolve(f.result); pending.delete(f.id); }
        else if (f.op === 'error' && pending.has(f.id)) { pending.get(f.id).reject(new Error(f.error)); pending.delete(f.id); }
      };
      ws.onclose = () => { setConn(false); setTimeout(connect, 1000); }; // reconnect loop
      ws.onerror = () => { try { ws.close(); } catch {} };
    }
    connect();
  </script>
</body>
</html>
